<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AuraStream</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0f;--surface:#111118;--surface2:#18181f;
  --border:rgba(255,255,255,0.06);--border-lit:rgba(255,255,255,0.12);
  --text:#e8e8f0;--text-muted:#6b6b7e;--text-dim:#3e3e50;
  --accent:#c8f542;--accent-alt:#7c4dff;--accent-warm:#ff6b35;
  --player-h:88px;--sidebar-w:240px;--radius:12px;--radius-sm:6px;
  --font:'Syne',sans-serif;--mono:'DM Mono',monospace;--aura:#c8f542;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);overflow:hidden}
button{cursor:pointer;border:none;background:none;color:inherit;font-family:inherit}
input{font-family:inherit}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border-lit);border-radius:2px}

/* Layout */
#app{display:grid;grid-template-columns:var(--sidebar-w) 1fr;grid-template-rows:1fr var(--player-h);height:100vh;overflow:hidden}

/* Sidebar */
.sidebar{grid-row:1;grid-column:1;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:28px 0 16px;overflow-y:auto}
.sidebar-logo{padding:0 22px 28px;font-size:20px;font-weight:800;letter-spacing:-.5px;display:flex;align-items:center;gap:10px}
.logo-dot{width:10px;height:10px;border-radius:50%;background:var(--accent);box-shadow:0 0 12px var(--accent);animation:pulse-dot 2s ease-in-out infinite}
@keyframes pulse-dot{0%,100%{box-shadow:0 0 8px var(--accent)}50%{box-shadow:0 0 20px var(--accent),0 0 40px rgba(200,245,66,.3)}}
.sidebar-label{padding:0 22px 8px;font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--text-dim);font-family:var(--mono)}
.sidebar-item{display:flex;align-items:center;gap:12px;padding:10px 22px;font-size:14px;font-weight:500;color:var(--text-muted);cursor:pointer;width:100%;text-align:left;transition:color .15s,background .15s}
.sidebar-item:hover{color:var(--text);background:rgba(255,255,255,.04)}
.sidebar-item.active{color:var(--accent);background:rgba(200,245,66,.06)}
.sidebar-item .icon{font-size:16px;width:20px;text-align:center}
.sidebar-divider{height:1px;background:var(--border);margin:12px 22px}
.sidebar-section{margin-bottom:8px}

/* Main */
.main{grid-row:1;grid-column:2;overflow-y:auto;display:flex;flex-direction:column}

/* Topbar */
.topbar{position:sticky;top:0;z-index:10;padding:20px 32px 16px;background:linear-gradient(to bottom,var(--bg) 60%,transparent);display:flex;align-items:center;gap:16px}
.search-wrap{flex:1;max-width:480px;position:relative}
.search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:15px;color:var(--text-dim);pointer-events:none}
.search-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:40px;padding:10px 16px 10px 42px;font-size:14px;color:var(--text);outline:none;transition:border-color .2s,box-shadow .2s}
.search-input::placeholder{color:var(--text-dim)}
.search-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(200,245,66,.08)}
.topbar-actions{display:flex;gap:8px;margin-left:auto}
.topbar-btn{width:36px;height:36px;border-radius:50%;background:var(--surface2);border:1px solid var(--border);font-size:16px;display:flex;align-items:center;justify-content:center;transition:border-color .15s,background .15s}
.topbar-btn:hover{border-color:var(--border-lit);background:var(--surface)}
.topbar-btn.active{border-color:var(--accent);color:var(--accent)}

/* Content */
.content{padding:0 32px 120px;flex:1}
.section-header{display:flex;align-items:baseline;gap:12px;margin-bottom:20px;margin-top:32px}
.section-title{font-size:20px;font-weight:700;letter-spacing:-.3px}
.section-count{font-size:12px;color:var(--text-dim);font-family:var(--mono)}
.section-more{margin-left:auto;font-size:12px;color:var(--text-muted);font-family:var(--mono);cursor:pointer;transition:color .15s}
.section-more:hover{color:var(--accent)}

/* Now Banner */
.now-banner{border-radius:var(--radius);overflow:hidden;position:relative;height:200px;background:linear-gradient(135deg,#1a1a2e,#0a0a0f);display:flex;align-items:flex-end;padding:24px;gap:20px;transition:background 1.2s ease}
.now-banner-art{width:120px;height:120px;border-radius:8px;object-fit:cover;box-shadow:0 8px 32px rgba(0,0,0,.5);z-index:1;flex-shrink:0;background:var(--surface2)}
.now-banner-info{z-index:1;flex:1;min-width:0}
.now-banner-eyebrow{font-size:11px;font-family:var(--mono);letter-spacing:2px;color:var(--accent);text-transform:uppercase;margin-bottom:6px}
.now-banner-title{font-size:28px;font-weight:800;letter-spacing:-1px;line-height:1.1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.now-banner-artist{font-size:14px;color:rgba(255,255,255,.6);margin-top:6px}
.now-banner-play{z-index:1;width:52px;height:52px;border-radius:50%;background:var(--accent);color:#0a0a0f;font-size:20px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:transform .15s,box-shadow .15s;box-shadow:0 4px 20px rgba(200,245,66,.4)}
.now-banner-play:hover{transform:scale(1.08)}

/* Track Grid */
.track-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(168px,1fr));gap:16px}
.track-card{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:14px;cursor:pointer;transition:border-color .2s,transform .2s,box-shadow .2s;position:relative;overflow:hidden}
.track-card:hover{border-color:var(--border-lit);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.3)}
.track-card.playing{border-color:rgba(200,245,66,.3)}
.track-art-wrap{position:relative;border-radius:8px;overflow:hidden;aspect-ratio:1;margin-bottom:12px;background:var(--surface)}
.track-art{width:100%;height:100%;object-fit:cover;display:block;transition:transform .3s}
.track-card:hover .track-art{transform:scale(1.04)}
.track-play-overlay{position:absolute;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .2s}
.track-card:hover .track-play-overlay{opacity:1}
.track-play-btn{width:44px;height:44px;border-radius:50%;background:var(--accent);color:#0a0a0f;font-size:18px;display:flex;align-items:center;justify-content:center;transform:scale(.8);transition:transform .2s}
.track-card:hover .track-play-btn{transform:scale(1)}
.track-eq{position:absolute;bottom:8px;right:8px;display:flex;align-items:flex-end;gap:2px;height:16px}
.track-eq span{width:3px;background:var(--accent);border-radius:2px;animation:eq-bar .8s ease-in-out infinite alternate}
.track-eq span:nth-child(1){height:40%;animation-delay:0s}
.track-eq span:nth-child(2){height:80%;animation-delay:.15s}
.track-eq span:nth-child(3){height:55%;animation-delay:.3s}
.track-eq span:nth-child(4){height:90%;animation-delay:.1s}
@keyframes eq-bar{from{transform:scaleY(.4)}to{transform:scaleY(1)}}
.track-title{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3}
.track-artist{font-size:12px;color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
.track-duration{font-size:11px;color:var(--text-dim);font-family:var(--mono);margin-top:6px}

/* Track List */
.track-list{display:flex;flex-direction:column;gap:2px}
.track-row{display:grid;grid-template-columns:40px 44px 1fr auto 32px;align-items:center;gap:12px;padding:8px 12px;border-radius:var(--radius-sm);cursor:pointer;transition:background .15s}
.track-row:hover{background:var(--surface2)}
.track-row.playing{background:rgba(200,245,66,.06)}
.track-row-num{font-size:12px;color:var(--text-dim);font-family:var(--mono);text-align:center}
.track-row-thumb{width:40px;height:40px;border-radius:var(--radius-sm);object-fit:cover;background:var(--surface2)}
.track-row-info .title{font-size:14px;font-weight:500}
.track-row-info .artist{font-size:12px;color:var(--text-muted);margin-top:1px}
.track-row-dur{font-size:12px;font-family:var(--mono);color:var(--text-dim)}
.track-row-like{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--text-dim);transition:color .15s,background .15s;opacity:0}
.track-row:hover .track-row-like{opacity:1}
.track-row-like.liked{opacity:1;color:var(--accent-warm)}

/* Player Bar */
.player-bar{grid-row:2;grid-column:1/-1;background:rgba(17,17,24,.95);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-top:1px solid var(--border);display:grid;grid-template-columns:1fr auto 1fr;align-items:center;padding:0 24px;gap:16px;position:relative;z-index:50}
.player-bar::before{content:'';position:absolute;bottom:100%;left:50%;transform:translateX(-50%);width:320px;height:80px;background:radial-gradient(ellipse,rgba(200,245,66,.12),transparent 70%);pointer-events:none;transition:background 1.2s ease}
.player-track{display:flex;align-items:center;gap:14px;min-width:0}
.player-thumb{width:50px;height:50px;border-radius:6px;object-fit:cover;background:var(--surface2);flex-shrink:0}
.player-track-info{min-width:0}
.player-track-title{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.player-track-artist{font-size:12px;color:var(--text-muted);margin-top:1px}
.player-like{margin-left:8px;font-size:18px;color:var(--text-dim);transition:color .15s,transform .15s;flex-shrink:0}
.player-like.liked{color:var(--accent-warm)}
.player-like:hover{transform:scale(1.2)}
.player-controls{display:flex;flex-direction:column;align-items:center;gap:10px;min-width:280px}
.ctrl-buttons{display:flex;align-items:center;gap:4px}
.ctrl-btn{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--text-muted);transition:color .15s,background .15s}
.ctrl-btn:hover{color:var(--text);background:rgba(255,255,255,.06)}
.ctrl-btn.active{color:var(--accent)}
.ctrl-play{width:44px;height:44px;background:var(--accent);color:#0a0a0f;font-size:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:transform .15s,box-shadow .15s;box-shadow:0 2px 12px rgba(200,245,66,.3)}
/* Ensure fast tapping responsiveness on touch devices */
.ctrl-btn, .ctrl-play { touch-action: manipulation; -webkit-tap-highlight-color: rgba(0,0,0,0); }
.ctrl-play:hover{transform:scale(1.08)}
.progress-wrap{display:flex;align-items:center;gap:10px;width:100%}
.progress-time{font-size:11px;font-family:var(--mono);color:var(--text-dim);flex-shrink:0;width:36px}
.progress-time.end{text-align:right}
.progress-track{flex:1;height:4px;background:var(--surface2);border-radius:2px;cursor:pointer;position:relative;transition:height .15s}
.progress-track:hover{height:6px}
.progress-buffered{position:absolute;left:0;top:0;bottom:0;background:rgba(255,255,255,.08);border-radius:2px;pointer-events:none}
.progress-fill{position:absolute;left:0;top:0;bottom:0;background:var(--accent);border-radius:2px;pointer-events:none;transition:width .1s linear}
.progress-thumb{position:absolute;top:50%;transform:translate(-50%,-50%);width:12px;height:12px;border-radius:50%;background:var(--accent);opacity:0;transition:opacity .15s;pointer-events:none}
.progress-track:hover .progress-thumb{opacity:1}
.player-right{display:flex;align-items:center;justify-content:flex-end;gap:8px}
.vol-wrap{display:flex;align-items:center;gap:8px}
.vol-icon{font-size:15px;color:var(--text-muted);cursor:pointer}
.vol-slider{-webkit-appearance:none;width:80px;height:4px;border-radius:2px;background:var(--surface2);outline:none;cursor:pointer}
.vol-slider::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:var(--text);cursor:pointer}
.player-icon-btn{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;color:var(--text-muted);transition:color .15s,background .15s}
.player-icon-btn:hover{color:var(--text);background:rgba(255,255,255,.06)}
.player-icon-btn.active{color:var(--accent)}

/* Lyrics Panel */
.lyrics-panel{position:fixed;right:0;top:0;bottom:var(--player-h);width:320px;background:rgba(10,10,15,.97);backdrop-filter:blur(24px);border-left:1px solid var(--border);display:flex;flex-direction:column;transform:translateX(100%);transition:transform .3s ease;z-index:40}
.lyrics-panel.open{transform:translateX(0)}
.lyrics-header{padding:20px 20px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.lyrics-title-text{font-size:14px;font-weight:700;letter-spacing:.5px}
.lyrics-close{font-size:20px;color:var(--text-muted);cursor:pointer;transition:color .15s}
.lyrics-close:hover{color:var(--text)}
.lyrics-body{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:6px}
.lyric-line{font-size:15px;line-height:1.7;color:var(--text-dim);transition:color .3s,transform .3s,font-size .3s;cursor:pointer;padding:2px 0;border-radius:4px}
.lyric-line.active{color:var(--text);font-size:17px;font-weight:700}
.lyric-line.past{color:var(--text-muted)}
.lyrics-plain{font-size:14px;line-height:1.9;color:var(--text-muted);white-space:pre-line}
.lyrics-loading{display:flex;align-items:center;justify-content:center;flex:1;color:var(--text-dim);font-family:var(--mono);font-size:13px}
.lyrics-none{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:8px;color:var(--text-dim)}
.lyrics-none .icon{font-size:36px;opacity:.3}

/* Sleep Timer Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);z-index:100;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--surface);border:1px solid var(--border-lit);border-radius:var(--radius);padding:28px;width:320px;display:flex;flex-direction:column;gap:16px}
.modal-title{font-size:18px;font-weight:700}
.modal-sub{font-size:13px;color:var(--text-muted)}
.timer-options{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.timer-opt{padding:12px;border-radius:var(--radius-sm);border:1px solid var(--border);font-size:14px;font-weight:600;text-align:center;cursor:pointer;transition:border-color .15s,background .15s,color .15s}
.timer-opt:hover{border-color:var(--border-lit);background:var(--surface2)}
.timer-opt.active{border-color:var(--accent);color:var(--accent);background:rgba(200,245,66,.06)}
.timer-display{font-family:var(--mono);font-size:28px;font-weight:700;text-align:center;color:var(--accent);letter-spacing:2px}
.modal-btn{padding:12px;border-radius:var(--radius-sm);background:var(--accent);color:#0a0a0f;font-size:14px;font-weight:700;cursor:pointer;text-align:center;transition:opacity .15s}
.modal-btn:hover{opacity:.9}
.modal-btn.secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border)}

/* DB Import/Export Panel */
.db-panel{padding:0 32px 32px}
.db-card{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:20px;display:flex;flex-direction:column;gap:12px;margin-bottom:12px}
.db-card-title{font-size:15px;font-weight:700}
.db-card-sub{font-size:13px;color:var(--text-muted);line-height:1.5}
.db-btn{padding:10px 18px;border-radius:var(--radius-sm);background:var(--surface);border:1px solid var(--border-lit);font-size:13px;font-weight:600;cursor:pointer;transition:background .15s,border-color .15s;align-self:flex-start}
.db-btn:hover{background:var(--border-lit)}
.db-btn.accent{background:rgba(200,245,66,.1);border-color:rgba(200,245,66,.3);color:var(--accent)}

/* URL import bar */
.url-bar{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:16px 20px;margin-bottom:0;display:flex;gap:12px;align-items:center}
.url-input{flex:1;background:transparent;border:none;outline:none;font-size:14px;color:var(--text)}
.url-input::placeholder{color:var(--text-dim)}
.url-btn{padding:8px 16px;border-radius:var(--radius-sm);background:var(--accent);color:#0a0a0f;font-size:13px;font-weight:700;flex-shrink:0;cursor:pointer}

/* Skeleton */
.skeleton{background:linear-gradient(90deg,var(--surface2) 25%,var(--surface) 50%,var(--surface2) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:var(--radius-sm)}
@keyframes shimmer{from{background-position:200% 0}to{background-position:-200% 0}}
.skeleton-art{width:100%;aspect-ratio:1;border-radius:8px}
.skeleton-text{height:12px;margin-top:10px;width:80%}
.skeleton-text.short{width:55%}

/* Empty state */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:64px 32px;text-align:center;gap:12px}
.empty-icon{font-size:48px;opacity:.25}
.empty-title{font-size:18px;font-weight:600;color:var(--text-muted)}
.empty-sub{font-size:13px;color:var(--text-dim)}

/* Toast */
.toast{position:fixed;bottom:calc(var(--player-h) + 16px);left:50%;transform:translateX(-50%) translateY(16px);background:#1a1a24;border:1px solid var(--border-lit);color:var(--text);padding:10px 20px;border-radius:40px;font-size:13px;font-family:var(--mono);opacity:0;pointer-events:none;transition:opacity .3s,transform .3s;z-index:200;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.error{background:#2a1018;border-color:#ff3b30;color:#ff3b30}

/* Buffering */
.buffering-ring{width:20px;height:20px;border:2px solid rgba(200,245,66,.2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Search Type Pills */
.type-pill{padding:8px 14px;border-radius:999px;border:1px solid var(--border);background:var(--surface2);font-size:13px;font-weight:700;color:var(--text-muted);cursor:pointer;transition:border-color .15s,background .15s,color .15s}
.type-pill:hover{border-color:var(--border-lit);color:var(--text)}

/* Sleep timer badge */
.sleep-badge{position:fixed;bottom:calc(var(--player-h) + 12px);right:16px;background:var(--surface);border:1px solid var(--accent);border-radius:40px;padding:6px 14px;font-size:12px;font-family:var(--mono);color:var(--accent);z-index:60;display:none;align-items:center;gap:8px}
.sleep-badge.visible{display:flex}
.sleep-cancel{cursor:pointer;opacity:.6;font-size:16px;transition:opacity .15s}
.sleep-cancel:hover{opacity:1}

/* Responsive */
@media(max-width:768px){
  :root{--sidebar-w:0px;--player-h:76px}

  /* Layout: keep grid but ensure content isn't clipped by floating controls */
  #app{grid-template-columns:1fr;grid-template-rows:1fr}
  .sidebar{display:none}
  .main{grid-column:1}
  .content{padding:0 16px calc(var(--player-h) + 24px + env(safe-area-inset-bottom));}
  .topbar{padding:16px 16px 12px}
  .track-grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px}

  /* Floating glassmorphic pill player */
  .player-bar{
    position:fixed;
    bottom:76px;
    left:12px;
    right:12px;
    height:64px;
    background: rgba(18, 18, 26, 0.85) !important;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius:16px;
    display:grid;
    grid-template-columns: 1fr auto;
    align-items:center;
    padding:0 16px;
    box-shadow:0 8px 32px rgba(0,0,0,0.5);
    z-index:49;
    overflow:hidden;
  }

  /* Track area sizing: allow room for controls */
  .player-track{display:flex;align-items:center;gap:12px;min-width:0;max-width:75%}
  .player-track-info{min-width:0;overflow:hidden}
  .player-track-title{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .player-track-artist{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

  /* Compact controls inline */
  .player-controls{display:flex;align-items:center;gap:8px;justify-self:end}
  .ctrl-buttons{display:flex;gap:8px;align-items:center}

  /* Small integrated play/pause on the right edge of the pill */
  .ctrl-play{
    width:36px;height:36px;border-radius:8px;background:transparent;color:#fff;font-size:20px;display:flex;align-items:center;justify-content:center;border:none;box-shadow:none;padding:0
  }

  /* Mobile progress tracking micro-line configuration */
  .player-bar .absolute-bottom-progress{position:absolute;bottom:0;left:0;right:0;height:2px;background:rgba(255,255,255,0.08)}
  .player-bar .absolute-bottom-progress-fill{height:100%;background:var(--accent);width:0%;transition:width .1s linear}

  .player-right{display:none}
  .lyrics-panel{width:100%}
}

/* Mobile Player Page Styles */

<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════════════════════════════
// AURASTREAM — COMPLETE FRONTEND ENGINE
// ═══════════════════════════════════════════════════════════════════

const API = '';

// ── 1. IndexedDB Setup ──────────────────────────────────────────────

const DB_NAME    = 'aurastream_v2';
const DB_VERSION = 2;
let db = null;

async function openDB() {
  return new Promise((res, rej) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = e => {
      const d = e.target.result;
      // Core stores
      if (!d.objectStoreNames.contains('liked'))      d.createObjectStore('liked',      { keyPath: 'id' });
      if (!d.objectStoreNames.contains('history'))    d.createObjectStore('history',    { keyPath: 'id' });
      if (!d.objectStoreNames.contains('playlists'))  d.createObjectStore('playlists',  { keyPath: 'id' });
      if (!d.objectStoreNames.contains('queue'))      d.createObjectStore('queue',      { keyPath: 'key' });
      // Audio chunk cache store
      if (!d.objectStoreNames.contains('cached_tracks')) {
        const cs = d.createObjectStore('cached_tracks', { keyPath: 'id' });
        cs.createIndex('cachedAt', 'cachedAt');
      }
    };
    req.onsuccess = e => res(e.target.result);
    req.onerror   = e => rej(e.target.error);
  });
}

async function dbGet(store, key) {
  return new Promise((res, rej) => {
    const req = db.transaction(store,'readonly').objectStore(store).get(key);
    req.onsuccess = () => res(req.result);
    req.onerror   = () => rej(req.error);
  });
}

async function dbGetAll(store) {
  return new Promise((res, rej) => {
    const req = db.transaction(store,'readonly').objectStore(store).getAll();
    req.onsuccess = () => res(req.result);
    req.onerror   = () => rej(req.error);
  });
}

async function dbPut(store, value) {
  return new Promise((res, rej) => {
    const req = db.transaction(store,'readwrite').objectStore(store).put(value);
    req.onsuccess = () => res();
    req.onerror   = () => rej(req.error);
  });
}

async function dbDelete(store, key) {
  return new Promise((res, rej) => {
    const req = db.transaction(store,'readwrite').objectStore(store).delete(key);
    req.onsuccess = () => res();
    req.onerror   = () => rej(req.error);
  });
}

// ── 2. Audio Chunk Cache ────────────────────────────────────────────
// Cache entire audio blobs in IndexedDB for offline replay

async function getCachedAudio(videoId) {
  try {
    const entry = await dbGet('cached_tracks', videoId);
    if (entry && entry.blob) return URL.createObjectURL(entry.blob);
  } catch {}
  return null;
}

async function cacheAudioBlob(videoId, blob, meta) {
  try {
    // Keep cache under 500MB — evict oldest if needed
    await evictCacheIfNeeded();
    await dbPut('cached_tracks', {
      id: videoId,
      blob,
      meta,
      cachedAt: Date.now(),
      size: blob.size,
    });
    log(`Cached audio for ${videoId} (${(blob.size/1024/1024).toFixed(1)}MB)`);
  } catch(e) {
    log('Cache write failed:', e);
  }
}

async function evictCacheIfNeeded() {
  const MAX_BYTES = 500 * 1024 * 1024; // 500MB
  const all = await dbGetAll('cached_tracks');
  const totalSize = all.reduce((s,e) => s + (e.size||0), 0);
  if (totalSize < MAX_BYTES) return;
  // Sort oldest first, delete until under limit
  all.sort((a,b) => a.cachedAt - b.cachedAt);
  let freed = 0;
  for (const entry of all) {
    await dbDelete('cached_tracks', entry.id);
    freed += entry.size || 0;
    if (totalSize - freed < MAX_BYTES * 0.8) break;
  }
}

// ── 3. Queue Persistence ────────────────────────────────────────────

async function persistQueue() {
  if (!db) return;
  try {
    await dbPut('queue', {
      key: 'current',
      queue: state.queue,
      queueIndex: state.queueIndex,
      currentTime: audio.currentTime,
      currentTrack: state.currentTrack,
    });
  } catch {}
}

async function restoreQueue() {
  if (!db) return;
  try {
    const saved = await dbGet('queue', 'current');
    if (!saved || !saved.queue?.length) return;
    state.queue      = saved.queue;
    state.queueIndex = saved.queueIndex || 0;
    state.currentTrack = saved.currentTrack;
    const track = state.currentTrack;
    if (!track) return;

    // Restore to player UI without auto-playing
    el('playerTitle').textContent  = track.title;
    el('playerArtist').textContent = track.artist;
    el('playerThumb').src          = track.thumbnail || '';
    syncLikeBtn();

    // Restore stream URL
    const cachedUrl = await getCachedAudio(track.id);
    audio.src = cachedUrl || `${API}/api/stream/${track.id}`;

    // Restore seek position
    audio.addEventListener('loadedmetadata', () => {
      if (saved.currentTime > 0) {
        audio.currentTime = Math.min(saved.currentTime, audio.duration - 1);
      }
    }, { once: true });

    showToast(`Restored: ${track.title}`);
    renderContent();
  } catch(e) {
    log('Queue restore error:', e);
  }
}

// ── 4. URL Intent Catcher ───────────────────────────────────────────

const YT_PATTERNS = [
  { re: /(?:youtube\.com\/watch\?v=|youtu\.be\/)([A-Za-z0-9_\-]{11})/, type: 'video' },
  { re: /youtube\.com\/playlist\?list=([A-Za-z0-9_\-]+)/,              type: 'playlist' },
  { re: /music\.youtube\.com\/watch\?v=([A-Za-z0-9_\-]{11})/,          type: 'video' },
];

function parseYouTubeUrl(input) {
  for (const p of YT_PATTERNS) {
    const m = input.match(p.re);
    if (m) return { type: p.type, id: m[1] };
  }
  return null;
}

async function handleUrlIntent(url) {
  const parsed = parseYouTubeUrl(url.trim());
  if (!parsed) return false;

  showToast('Loading from URL…');
  try {
    if (parsed.type === 'video') {
      const res  = await fetch(`${API}/api/track/${parsed.id}`);
      if (!res.ok) throw new Error('Track not found');
      const info = await res.json();
      const track = {
        id:        info.video_id || parsed.id,
        title:     info.title    || 'Unknown',
        artist:    info.artist   || 'Unknown',
        thumbnail: info.thumbnail || '',
        duration:  info.duration  || null,
      };
      loadTrack(track, [track], 0);
      return true;
    }
  } catch(e) {
    showToast('Could not load that URL', true);
  }
  return false;
}

// ── 5. State ────────────────────────────────────────────────────────

const state = {
  currentTrack:  null,

  // Segmented search classification: songs|albums|artists
  searchType:    'songs',
  queue:         [],
  queueIndex:    -1,
  isPlaying:     false,
  isBuffering:   false,

  // Continuous time-tracking engine
  currentTime:   0,
  duration:      0,
  isDragging:    false,

  volume:        0.85,
  isMuted:       false,
  repeatMode:    'none',
  isShuffled:    false,
  shuffleOrder:  [],
  likedIds:      new Set(),
  likedTracks:   [],
  history:       [],
  playlists:     [],
  view:          'home',
  searchQuery:   '',
  searchResults: [],
  isSearching:   false,
  lyricsOpen:    false,
  lyricsData:    null,
  lyricsLoading: false,
  sleepTimer:    null,   // { endTime, intervalId, fadeId }

  // Spotify-like mobile player
  isPlayerOpen:  false,
};


// ── 6. Audio Engine ─────────────────────────────────────────────────

const audio = new Audio();
audio.preload = 'metadata';

audio.addEventListener('timeupdate',     updateProgress);
audio.addEventListener('durationchange', () => {
  state.duration = isFinite(audio.duration) ? audio.duration : 0;
  el('durationEl').textContent = fmtTime(state.duration);
  persistQueue();
});
audio.addEventListener('playing',  () => { state.isPlaying = true;  state.isBuffering = false; syncPlayBtn(); updateMediaSession(); });
audio.addEventListener('pause',    () => { state.isPlaying = false; syncPlayBtn(); updateMediaSession(); });
audio.addEventListener('waiting',  () => { state.isBuffering = true;  syncPlayBtn(); });
audio.addEventListener('canplay',  () => { state.isBuffering = false; syncPlayBtn(); });
audio.addEventListener('ended',    handleTrackEnd);
audio.addEventListener('progress', updateBuffered);
audio.addEventListener('error',    () => {
  state.isPlaying = false; state.isBuffering = false; syncPlayBtn();
  showToast('Stream error — skipping', true);
  setTimeout(nextTrack, 1200);
});
audio.volume = state.volume;

async function loadTrack(track, queue = [track], index = 0, autoplay = true) {
  state.currentTrack = track;
  state.queue        = queue;
  state.queueIndex   = index;
  state.lyricsData   = null;

  // Check cache first
  const cachedUrl = await getCachedAudio(track.id);

  if (cachedUrl) {
    log(`Playing from cache: ${track.id}`);
    audio.src = cachedUrl;
  } else {
    audio.src = `${API}/api/stream/${track.id}`;
    // Background cache after playback starts
    cacheTrackInBackground(track);
  }

  audio.load();
  if (autoplay) audio.play().catch(() => {});

  el('playerTitle').textContent  = track.title;
  el('playerArtist').textContent = track.artist;
  el('playerThumb').src          = track.thumbnail || '';
  const mpArt = el('mpArt'); if (mpArt) mpArt.src = track.thumbnail || '';
  const mpt = el('mpTitle'); if (mpt) mpt.textContent = track.title;
  const mpa = el('mpArtist'); if (mpa) mpa.textContent = track.artist;

  syncLikeBtn();
  extractAuraColor(track.thumbnail);
  updateMediaSession(track);
  persistHistory(track);
  persistQueue();
  renderContent();

  // Load lyrics if panel open
  if (state.lyricsOpen) fetchLyrics(track.id);
}

async function cacheTrackInBackground(track) {
  // After 10s of playback, fetch & cache the full audio blob
  await new Promise(r => setTimeout(r, 10000));
  if (state.currentTrack?.id !== track.id) return; // user moved on
  try {
    const res  = await fetch(`${API}/api/stream/${track.id}`);
    if (!res.ok) return;
    const blob = await res.blob();
    await cacheAudioBlob(track.id, blob, track);
  } catch(e) {
    log('Background cache failed:', e);
  }
}

function handleTrackEnd() {
  if (state.repeatMode === 'one') { audio.currentTime = 0; audio.play(); return; }
  const next = resolveNextIndex(1);
  if (next !== null) loadTrack(state.queue[next], state.queue, next);
  else { state.isPlaying = false; syncPlayBtn(); }
}

function resolveNextIndex(dir) {
  const { queue, queueIndex, repeatMode, isShuffled, shuffleOrder } = state;
  if (!queue.length) return null;
  if (isShuffled && shuffleOrder.length) {
    const pos  = shuffleOrder.indexOf(queueIndex);
    const next = pos + dir;
    if (next < 0 || next >= shuffleOrder.length) return repeatMode === 'all' ? 0 : null;
    return shuffleOrder[next];
  }
  const next = queueIndex + dir;
  if (next < 0)             return repeatMode === 'all' ? queue.length - 1 : null;
  if (next >= queue.length) return repeatMode === 'all' ? 0 : null;
  return next;
}

function togglePlay() {
  if (state.isBuffering || !state.currentTrack) return;
  if (state.isPlaying) audio.pause();
  else audio.play().catch(() => {});
}

function prevTrack() {
  if (audio.currentTime > 3) { audio.currentTime = 0; return; }
  const prev = resolveNextIndex(-1);
  if (prev !== null) loadTrack(state.queue[prev], state.queue, prev);
}

function nextTrack() {
  const next = resolveNextIndex(1);
  if (next !== null) loadTrack(state.queue[next], state.queue, next);
}

function toggleShuffle() {
  state.isShuffled = !state.isShuffled;
  if (state.isShuffled) {
    const indices = state.queue.map((_,i) => i).filter(i => i !== state.queueIndex);
    for (let i = indices.length-1; i > 0; i--) {
      const j = Math.floor(Math.random()*(i+1));
      [indices[i],indices[j]] = [indices[j],indices[i]];
    }
    state.shuffleOrder = [state.queueIndex, ...indices];
  }
  el('shuffleBtn').classList.toggle('active', state.isShuffled);
}

function cycleRepeat() {
  const modes = ['none','all','one'];
  const idx   = modes.indexOf(state.repeatMode);
  state.repeatMode = modes[(idx+1) % modes.length];
  const icons = { none:'↻', all:'↻', one:'↺' };
  el('repeatBtn').textContent = icons[state.repeatMode];
  el('repeatBtn').classList.toggle('active', state.repeatMode !== 'none');
}

function setVolume(v) {
  state.volume  = Math.max(0, Math.min(1, v));
  audio.volume  = state.isMuted ? 0 : state.volume;
  el('volSlider').value = Math.round(state.volume * 100);
  el('volIcon').textContent = state.volume === 0 ? '🔇' : state.volume < 0.5 ? '🔉' : '🔊';
}

function toggleMute() {
  state.isMuted = !state.isMuted;
  audio.volume  = state.isMuted ? 0 : state.volume;
  el('volIcon').textContent = state.isMuted ? '🔇' : state.volume < 0.5 ? '🔉' : '🔊';
}

// ── 7. Progress UI ──────────────────────────────────────────────────

function updateProgress() {
  // Continuous progress tracker (observer loop)
  if (state.isDragging) return;

  const t   = audio.currentTime;
  const dur = state.duration;

  state.currentTime = t;
  el('currentTimeEl').textContent = fmtTime(t);

  if (dur > 0) {
    const pct = (t / dur) * 100;
    el('progressFill').style.width = `${pct}%`;
    el('progressThumb').style.left = `${pct}%`;
    const mobileFill = document.getElementById('mobileProgressFill');
    if (mobileFill) mobileFill.style.width = `${pct}%`;
    const mpScrub = el('mobilePlayerScrub'); if (mpScrub) mpScrub.value = pct;
  }

  updateLyricsSync(t);
}

function handleScrubStart() {
  state.isDragging = true;
}

function handleScrubChange(clientX, trackEl) {
  // Update UI progress in real-time without fighting the cursor
  if (!state.duration) return;
  const rect = trackEl.getBoundingClientRect();
  const pct  = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
  const newTime = pct * state.duration;

  state.currentTime = newTime;
  el('currentTimeEl').textContent = fmtTime(newTime);

  // UI-only update
  const pct100 = pct * 100;
  el('progressFill').style.width = `${pct100}%`;
  el('progressThumb').style.left = `${pct100}%`;
  const mobileFill = document.getElementById('mobileProgressFill');
  if (mobileFill) mobileFill.style.width = `${pct100}%`;
  const mpScrub = el('mobilePlayerScrub'); if (mpScrub) mpScrub.value = pct100;

  // Optional: keep lyrics in sync visually while scrubbing
  updateLyricsSync(newTime);
}

function handleScrubEnd(newTime) {
  state.isDragging = false;
  if (!state.duration) return;
  audio.currentTime = Math.max(0, Math.min(state.duration, newTime));
}

function handleMobileScrub(val) {
  state.isDragging = true;
  if (!audio.duration) return;
  const target = (val / 100) * audio.duration;
  el('currentTimeEl').textContent = fmtTime(target);
}

function handleMobileScrubEnd(val) {
  state.isDragging = false;
  if (!audio.duration) return;
  audio.currentTime = (val / 100) * audio.duration;
}

function updateBuffered() {

  if (!audio.buffered.length) return;
  const buf = audio.buffered.end(audio.buffered.length - 1);
  if (state.duration > 0)
    el('progressBuffered').style.width = `${(buf / state.duration) * 100}%`;
}

function handleProgressClick(e) {
  // Pointer scrubbing for desktop click + keyboard
  if (!state.duration) return;
  const rect = e.currentTarget.getBoundingClientRect();
  const pct  = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
  handleScrubEnd(pct * state.duration);
}

function handleProgressTouchStart(e) {
  if (!state.duration) return;
  const trackEl = e.currentTarget;
  handleScrubStart();
  const touch = e.touches[0];
  if (touch) handleScrubChange(touch.clientX, trackEl);
}

function handleProgressTouchMove(e) {
  if (!state.isDragging) return;
  const trackEl = e.currentTarget;
  const touch = e.touches[0];
  if (touch) handleScrubChange(touch.clientX, trackEl);
}

function handleProgressTouchEnd(e) {
  if (!state.isDragging) return;
  // compute final time from last known UI position
  const trackEl = e.currentTarget;
  const rect = trackEl.getBoundingClientRect();
  const pct  = Math.max(0, Math.min(1, (state.currentTime / state.duration)));
  handleScrubEnd(pct * state.duration);
}


// ── 8. Media Session API ────────────────────────────────────────────

function updateMediaSession(track) {
  if (!('mediaSession' in navigator)) return;
  track = track || state.currentTrack;
  if (!track) return;

  navigator.mediaSession.metadata = new MediaMetadata({
    title:   track.title,
    artist:  track.artist,
    artwork: track.thumbnail ? [
      { src: track.thumbnail, sizes: '512x512', type: 'image/jpeg' },
      { src: track.thumbnail, sizes: '256x256', type: 'image/jpeg' },
    ] : [],
  });

  navigator.mediaSession.playbackState = state.isPlaying ? 'playing' : 'paused';

  const setA = (action, handler) => {
    try { navigator.mediaSession.setActionHandler(action, handler); } catch {}
  };
  setA('play',           () => audio.play());
  setA('pause',          () => audio.pause());
  setA('nexttrack',      () => nextTrack());
  setA('previoustrack',  () => prevTrack());
  setA('seekto',         d  => { if (d.seekTime !== undefined) audio.currentTime = d.seekTime; });
  setA('seekforward',    d  => { audio.currentTime = Math.min(audio.currentTime + (d.seekOffset||10), state.duration); });
  setA('seekbackward',   d  => { audio.currentTime = Math.max(audio.currentTime - (d.seekOffset||10), 0); });

  if (isFinite(state.duration) && state.duration > 0) {
    try {
      navigator.mediaSession.setPositionState({
        duration:     state.duration,
        playbackRate: audio.playbackRate,
        position:     Math.min(audio.currentTime, state.duration),
      });
    } catch {}
  }
}

// ── 9. Dynamic Theme (Aura Color) ───────────────────────────────────

function extractAuraColor(imgUrl) {
  if (!imgUrl) return;
  const img = new Image();
  img.crossOrigin = 'anonymous';
  img.onload = () => {
    try {
      const canvas = document.createElement('canvas');
      canvas.width = canvas.height = 64;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, 64, 64);
      const data = ctx.getImageData(0, 0, 64, 64).data;

      // Find most vibrant pixel (highest saturation)
      let bestR = 200, bestG = 245, bestB = 66, bestSat = 0;
      for (let i = 0; i < data.length; i += 4) {
        const r = data[i], g = data[i+1], b = data[i+2];
        const max = Math.max(r,g,b), min = Math.min(r,g,b);
        const sat = max === 0 ? 0 : (max - min) / max;
        const brightness = max / 255;
        if (sat > bestSat && brightness > 0.3 && brightness < 0.95) {
          bestSat = sat; bestR = r; bestG = g; bestB = b;
        }
      }

      const hex = `#${bestR.toString(16).padStart(2,'0')}${bestG.toString(16).padStart(2,'0')}${bestB.toString(16).padStart(2,'0')}`;
      document.documentElement.style.setProperty('--aura', hex);

      // Apply gradient to banner
      const banner = el('nowBanner');
      if (banner) {
        banner.style.background = `linear-gradient(135deg,
          rgba(${bestR},${bestG},${bestB},0.45) 0%,
          rgba(${Math.round(bestR*.4)},${Math.round(bestG*.4)},${Math.round(bestB*.4)},0.3) 60%,
          rgba(10,10,15,.98) 100%)`;
      }
    } catch {}
  };
  img.onerror = () => {};
  img.src = imgUrl;
}

// ── 10. Lyrics Engine ───────────────────────────────────────────────

let _lyricsRafId = null;
let _activeLyricIdx = -1;

async function fetchLyrics(videoId) {
  state.lyricsLoading = true;
  state.lyricsData    = null;
  _activeLyricIdx     = -1;
  renderLyricsPanel();

  try {
    const res  = await fetch(`${API}/api/lyrics/${videoId}`);
    const data = await res.json();
    state.lyricsData    = data;
    state.lyricsLoading = false;
  } catch {
    state.lyricsData    = { synced: false, lines: [], plain: '', source: 'none' };
    state.lyricsLoading = false;
  }
  renderLyricsPanel();
}

function renderLyricsPanel() {
  const body = el('lyricsBody');
  if (!body) return;

  if (state.lyricsLoading) {
    body.innerHTML = `<div class="lyrics-loading">Loading lyrics…</div>`;
    return;
  }

  const data = state.lyricsData;
  if (!data || data.source === 'none') {
    body.innerHTML = `<div class="lyrics-none"><span class="icon">♪</span><span>No lyrics found</span></div>`;
    return;
  }

  if (data.synced && data.lines.length) {
    body.innerHTML = data.lines.map((line, i) =>
      `<div class="lyric-line" data-idx="${i}" data-time="${line.time}"
            onclick="audio.currentTime=${line.time}">${esc(line.text) || '♩'}</div>`
    ).join('');
    return;
  }

  if (data.plain) {
    body.innerHTML = `<div class="lyrics-plain">${esc(data.plain)}</div>`;
    return;
  }

  body.innerHTML = `<div class="lyrics-none"><span class="icon">♪</span><span>No lyrics found</span></div>`;
}

function updateLyricsSync(currentTime) {
  if (!state.lyricsOpen || !state.lyricsData?.synced) return;
  const lines = state.lyricsData.lines;
  if (!lines?.length) return;

  // Binary search for current line
  let lo = 0, hi = lines.length - 1, best = 0;
  while (lo <= hi) {
    const mid = (lo + hi) >> 1;
    if (lines[mid].time <= currentTime) { best = mid; lo = mid + 1; }
    else hi = mid - 1;
  }

  if (best === _activeLyricIdx) return;
  _activeLyricIdx = best;

  const body = el('lyricsBody');
  if (!body) return;

  const allLines = body.querySelectorAll('.lyric-line');
  allLines.forEach((el, i) => {
    el.classList.remove('active', 'past');
    if (i < best)  el.classList.add('past');
    if (i === best) el.classList.add('active');
  });

  // Smooth scroll active line into view
  const activeLine = body.querySelector('.lyric-line.active');
  if (activeLine) {
    activeLine.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }
}

function toggleLyrics() {
  state.lyricsOpen = !state.lyricsOpen;
  el('lyricsPanel').classList.toggle('open', state.lyricsOpen);
  el('lyricsBtn').classList.toggle('active', state.lyricsOpen);
  el('lyricsToggleBtn').classList.toggle('active', state.lyricsOpen);

  if (state.lyricsOpen && state.currentTrack && !state.lyricsData) {
    fetchLyrics(state.currentTrack.id);
  }
}

// ── 11. Sleep Timer ─────────────────────────────────────────────────

function setSleepTimer(minutes, btnEl) {
  cancelSleepTimer();
  document.querySelectorAll('.timer-opt').forEach(b => b.classList.remove('active'));
  btnEl.classList.add('active');

  const endTime  = Date.now() + minutes * 60 * 1000;
  const interval = setInterval(() => {
    const remaining = endTime - Date.now();
    if (remaining <= 0) {
      // Fade out over 10 seconds then pause
      fadeThenPause();
      cancelSleepTimer();
      return;
    }
    // Start fade in last 30s
    if (remaining <= 30000) {
      const vol = Math.max(0, (remaining / 30000) * state.volume);
      audio.volume = vol;
    }
    const mins = Math.floor(remaining / 60000);
    const secs = Math.floor((remaining % 60000) / 1000).toString().padStart(2,'0');
    const label = `${mins}:${secs}`;
    el('timerDisplay').textContent  = label;
    el('sleepBadgeTime').textContent = label;
  }, 1000);

  state.sleepTimer = { endTime, intervalId: interval };
  el('sleepBadge').classList.add('visible');
}

function fadeThenPause() {
  let vol = audio.volume;
  const fade = setInterval(() => {
    vol = Math.max(0, vol - 0.05);
    audio.volume = vol;
    if (vol <= 0) { clearInterval(fade); audio.pause(); audio.volume = state.volume; }
  }, 200);
}

function cancelSleepTimer() {
  if (state.sleepTimer?.intervalId) clearInterval(state.sleepTimer.intervalId);
  state.sleepTimer = null;
  audio.volume = state.volume;
  el('timerDisplay').textContent  = '--:--';
  el('sleepBadge').classList.remove('visible');
  document.querySelectorAll('.timer-opt').forEach(b => b.classList.remove('active'));
}

function openSleepModal()  { el('sleepModal').classList.add('open'); }
function closeSleepModal() { el('sleepModal').classList.remove('open'); }
el('sleepModal').addEventListener('click', e => { if (e.target === el('sleepModal')) closeSleepModal(); });

// ── 13. DB Export / Import ──────────────────────────────────────────

async function exportDB() {
  const [liked, history, playlists] = await Promise.all([
    dbGetAll('liked'),
    dbGetAll('history'),
    dbGetAll('playlists'),
  ]);
  const payload = {
    version:   2,
    exportedAt: new Date().toISOString(),
    liked,
    history,
    playlists,
  };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = `aurastream-backup-${Date.now()}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('Library exported ✓');
}

async function importDB(file) {
  try {
    const text    = await file.text();
    const payload = JSON.parse(text);
    if (!payload.version) throw new Error('Invalid backup file');

    const tx = db.transaction(['liked','history','playlists'], 'readwrite');
    for (const t of (payload.liked    || [])) tx.objectStore('liked').put(t);
    for (const t of (payload.history  || [])) tx.objectStore('history').put(t);
    for (const p of (payload.playlists|| [])) tx.objectStore('playlists').put(p);
    await new Promise((res, rej) => { tx.oncomplete = res; tx.onerror = rej; });

    // Reload state from DB
    state.likedTracks = await dbGetAll('liked');
    state.history     = await dbGetAll('history');
    state.playlists   = await dbGetAll('playlists');
    state.likedIds    = new Set(state.likedTracks.map(t => t.id));
    showToast(`Imported ${payload.liked?.length || 0} liked, ${payload.history?.length || 0} history ✓`);
    renderContent();
  } catch(e) {
    showToast('Import failed — invalid file', true);
  }
}

// ── Track Card & Row renderers ──────────────────────────────────────

function renderTrackCard(track, queue, index) {
  const playing = state.currentTrack?.id === track.id && state.isPlaying;
  return `
    <div class="track-card ${playing ? 'playing' : ''}"
         onclick="playFromList('${esc(track.id)}',${JSON.stringify(queue.map(t=>t.id)).replace(/"/g,'&quot;')})">
      <div class="track-art-wrap">
        <img class="track-art" src="${esc(track.thumbnail)}" loading="lazy" onerror="this.style.opacity=.1" alt=""/>
        <div class="track-play-overlay">
          <button class="track-play-btn">${playing ? '⏸' : '▶'}</button>
        </div>
        ${playing ? `<div class="track-eq"><span></span><span></span><span></span><span></span></div>` : ''}
      </div>
      <div class="track-title" title="${esc(track.title)}">${esc(track.title)}</div>
      <div class="track-artist">${esc(track.artist)}</div>
      ${track.duration ? `<div class="track-duration">${fmtTime(track.duration)}</div>` : ''}
    </div>`;
}

function renderTrackRow(track, queue, index) {
  const playing = state.currentTrack?.id === track.id;
  const liked   = state.likedIds.has(track.id);
  return `
    <div class="track-row ${playing ? 'playing' : ''}"
         onclick="playFromList('${esc(track.id)}',${JSON.stringify(queue.map(t=>t.id)).replace(/"/g,'&quot;')})">
      <div class="track-row-num">${playing && state.isPlaying ? '♪' : index+1}</div>
      <img class="track-row-thumb" src="${esc(track.thumbnail)}" loading="lazy" onerror="this.style.opacity=.1" alt=""/>
      <div class="track-row-info">
        <div class="title">${esc(track.title)}</div>
        <div class="artist">${esc(track.artist)}</div>
      </div>
      ${track.duration ? `<span class="track-row-dur">${fmtTime(track.duration)}</span>` : '<span></span>'}
      <button class="track-row-like ${liked ? 'liked' : ''}"
              onclick="event.stopPropagation();likeById('${esc(track.id)}')">${liked ? '♥' : '♡'}</button>
    </div>`;
}

// We store the full track objects in a map for quick lookup by id
const _trackMap = new Map();

function _registerTracks(tracks) {
  tracks.forEach(t => _trackMap.set(t.id, t));
}

function playFromList(id, idList) {
  // Re-resolve full track objects from our in-memory map + state lists
  const allTracks = [
    ...state.searchResults,
    ...state.likedTracks,
    ...state.history,
    ...state.queue,
  ];
  allTracks.forEach(t => _trackMap.set(t.id, t));

  const queue = idList.map(qid => _trackMap.get(qid)).filter(Boolean);
  const track = _trackMap.get(id);
  if (!track || !queue.length) return;

  loadTrack(track, queue, queue.findIndex(t => t.id === id));
}

function openMobilePlayer() {
  const elp = el('mobilePlayerPage'); if(!elp) return;
  // populate values
  el('mpTitle').textContent = el('playerTitle').textContent || '—';
  el('mpArtist').textContent = el('playerArtist').textContent || '—';
  const thumb = el('playerThumb') && el('playerThumb').src ? el('playerThumb').src : '';
  const mpArt = el('mpArt'); if (mpArt) mpArt.src = thumb;
  elp.classList.add('open'); elp.setAttribute('aria-hidden','false');
  syncPlayBtn(); syncLikeBtn();
}

function closeMobilePlayer() {
  const elp = el('mobilePlayerPage'); if(!elp) return; elp.classList.remove('open'); elp.setAttribute('aria-hidden','true');
}

async function likeById(id) {
  const all = [...state.searchResults, ...state.likedTracks, ...state.history];
  const t   = all.find(t => t.id === id);
  if (t) await toggleLike(t);
}

// ── View Routing ────────────────────────────────────────────────────

function setView(view, btnEl) {
  state.view = view;
  document.querySelectorAll('.sidebar-item').forEach(b => b.classList.remove('active'));
  if (btnEl) btnEl.classList.add('active');
  else {
    const m = document.querySelector(`[data-view="${view}"]`);
    if (m) m.classList.add('active');
  }
  renderContent();
}

function setViewSilent(view) {
  state.view = view;
  document.querySelectorAll('.sidebar-item').forEach(b => {
    b.classList.toggle('active', b.dataset.view === view);
  });
}

// ── Player Sync ─────────────────────────────────────────────────────

function syncPlayBtn() {
  const btn = el('playBtn');
  if (state.isBuffering) btn.innerHTML = '<div class="buffering-ring"></div>';
  else btn.textContent = state.isPlaying ? '⏸' : '▶';
  const mp = el('mobilePlayBtn'); if (mp) mp.textContent = state.isBuffering ? '⏸' : (state.isPlaying ? '⏸' : '▶');
}

function syncLikeBtn() {
  const btn = el('playerLikeBtn');
  if (!btn || !state.currentTrack) return;
  const liked = state.likedIds.has(state.currentTrack.id);
  btn.textContent = liked ? '♥' : '♡';
  btn.classList.toggle('liked', liked);
  const mpL = el('mpLike'); if (mpL) { mpL.textContent = liked ? '♥' : '♡'; mpL.classList.toggle('liked', liked); }
}

// ── Utilities ───────────────────────────────────────────────────────

function el(id)   { return document.getElementById(id); }
function log(...a){ console.log('[AuraStream]', ...a); }

function fmtTime(s) {
  if (!s || !isFinite(s)) return '0:00';
  const m   = Math.floor(s / 60);
  const sec = Math.floor(s % 60).toString().padStart(2,'0');
  return `${m}:${sec}`;
}

function esc(str = '') {
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

let _toastTimer = null;
function showToast(msg, isError = false) {
  const t = el('toast');
  t.textContent = msg;
  t.className   = `toast show${isError ? ' error' : ''}`;
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => t.classList.remove('show'), 3500);
}

// ── Init ─────────────────────────────────────────────────────────────

async function init() {
  try {
    db = await openDB();
    const [liked, hist, playlists] = await Promise.all([
      dbGetAll('liked'),
      dbGetAll('history'),
      dbGetAll('playlists'),
    ]);
    state.likedTracks = liked.reverse();
    state.likedIds    = new Set(liked.map(t => t.id));
    state.history     = hist.slice(-100).reverse();
    state.playlists   = playlists;
    liked.forEach(t => _trackMap.set(t.id, t));
    hist.forEach(t  => _trackMap.set(t.id, t));
  } catch(e) {
    log('IDB unavailable:', e);
  }

  renderContent();
  await restoreQueue();
}

init();
</script>
