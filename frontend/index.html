<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>AuraStream</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0f;--surface:#111118;--surface2:#18181f;
  --border:rgba(255,255,255,0.06);--border-lit:rgba(255,255,255,0.12);
  --text:#e8e8f0;--text-muted:#6b6b7e;--text-dim:#3e3e50;
  --accent:#c8f542;--accent-alt:#7c4dff;--accent-warm:#ff6b35;
  --player-h:88px;--sidebar-w:240px;--radius:12px;--radius-sm:6px;
  --font:'Syne',sans-serif;--mono:'DM Mono',monospace;--aura:#c8f542;
  --mobile-nav-h:64px;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);overflow:hidden;position:fixed;width:100%}
button{cursor:pointer;border:none;background:none;color:inherit;font-family:inherit}
input{font-family:inherit}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border-lit);border-radius:2px}

/* Layout */
#app{display:grid;grid-template-columns:var(--sidebar-w) 1fr;grid-template-rows:1fr var(--player-h);height:100vh;overflow:hidden}

/* Sidebar */
.sidebar{grid-row:1;grid-column:1;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:28px 0 16px;overflow-y:auto}
.sidebar-logo{padding:0 22px 28px;font-size:20px;font-weight:800;letter-spacing:-.5px;display:flex;align-items:center;gap:10px}
.logo-dot{width:10px;height:10px;border-radius:50%;background:var(--accent);box-shadow:0 0 12px var(--accent);animation:pulse-dot 2s ease-in-out infinite}
@keyframes pulse-dot{0%,100%{box-shadow:0 0 8px var(--accent)}50%{box-shadow:0 0 20px var(--accent),0 0 40px rgba(200,245,66,.3)}}
.sidebar-label{padding:0 22px 8px;font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--text-dim);font-family:var(--mono)}
.sidebar-item{display:flex;align-items:center;gap:12px;padding:10px 22px;font-size:14px;font-weight:500;color:var(--text-muted);cursor:pointer;width:100%;text-align:left;transition:color .15s,background .15s}
.sidebar-item:hover{color:var(--text);background:rgba(255,255,255,.04)}
.sidebar-item.active{color:var(--accent);background:rgba(200,245,66,.06)}
.sidebar-item .icon{font-size:16px;width:20px;text-align:center}
.sidebar-divider{height:1px;background:var(--border);margin:12px 22px}
.sidebar-section{margin-bottom:8px}

/* Mobile Bottom Navigation Bar (Visible only on phone sizes) */
.mobile-nav{display:none;position:fixed;bottom:0;left:0;right:0;height:var(--mobile-nav-h);background:rgba(17,17,24,0.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--border);grid-template-columns:repeat(4,1fr);align-items:center;z-index:45}
.mobile-nav-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;color:var(--text-muted);font-size:11px;font-weight:600}
.mobile-nav-btn .icon{font-size:18px}
.mobile-nav-btn.active{color:var(--accent)}

/* Main */
.main{grid-row:1;grid-column:2;overflow-y:auto;display:flex;flex-direction:column}

/* Topbar */
.topbar{position:sticky;top:0;z-index:10;padding:20px 32px 16px;background:linear-gradient(to bottom,var(--bg) 60%,transparent);display:flex;align-items:center;gap:16px}
.search-wrap{flex:1;max-width:480px;position:relative}
.search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:15px;color:var(--text-dim);pointer-events:none}
.search-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:40px;padding:10px 16px 10px 42px;font-size:14px;color:var(--text);outline:none;transition:border-color .2s,box-shadow .2s}
.search-input::placeholder{color:var(--text-dim)}
.search-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(200,245,66,.08)}
.topbar-actions{display:flex;gap:8px;margin-left:auto}
.topbar-btn{width:36px;height:36px;border-radius:50%;background:var(--surface2);border:1px solid var(--border);font-size:16px;display:flex;align-items:center;justify-content:center;transition:border-color .15s,background .15s}
.topbar-btn:hover{border-color:var(--border-lit);background:var(--surface)}
.topbar-btn.active{border-color:var(--accent);color:var(--accent)}

/* Content */
.content{padding:0 32px 120px;flex:1}
.section-header{display:flex;align-items:center;gap:12px;margin-bottom:20px;margin-top:32px}
.section-title{font-size:20px;font-weight:700;letter-spacing:-.3px}
.section-count{font-size:12px;color:var(--text-dim);font-family:var(--mono)}
.section-more{margin-left:auto;font-size:12px;color:var(--text-muted);font-family:var(--mono);cursor:pointer;transition:color .15s;background:none;border:none}
.section-more:hover{color:var(--accent)}

/* Playlist Create Area */
.playlist-trigger-bar{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:24px;display:flex;gap:12px;align-items:center}
.playlist-input{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:8px 16px;font-size:13px;color:var(--text);outline:none}
.playlist-input:focus{border-color:var(--accent)}
.playlist-btn{padding:8px 18px;border-radius:20px;background:var(--accent);color:#0a0a0f;font-size:13px;font-weight:700}

/* Now Banner */
.now-banner{border-radius:var(--radius);overflow:hidden;position:relative;height:200px;background:linear-gradient(135deg,#1a1a2e,#0a0a0f);display:flex;align-items:flex-end;padding:24px;gap:20px;transition:background 1.2s ease}
.now-banner-art{width:120px;height:120px;border-radius:8px;object-fit:cover;box-shadow:0 8px 32px rgba(0,0,0,.5);z-index:1;flex-shrink:0;background:var(--surface2)}
.now-banner-info{z-index:1;flex:1;min-width:0}
.now-banner-eyebrow{font-size:11px;font-family:var(--mono);letter-spacing:2px;color:var(--accent);text-transform:uppercase;margin-bottom:6px}
.now-banner-title{font-size:28px;font-weight:800;letter-spacing:-1px;line-height:1.1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.now-banner-artist{font-size:14px;color:rgba(255,255,255,.6);margin-top:6px}
.now-banner-play{z-index:1;width:52px;height:52px;border-radius:50%;background:var(--accent);color:#0a0a0f;font-size:20px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:transform .15s,box-shadow .15s;box-shadow:0 4px 20px rgba(200,245,66,.4)}
.now-banner-play:hover{transform:scale(1.08)}

/* Track Grid */
.track-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(168px,1fr));gap:16px}
.track-card{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:14px;cursor:pointer;transition:border-color .2s,transform .2s,box-shadow .2s;position:relative;overflow:hidden}
.track-card:hover{border-color:var(--border-lit);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.3)}
.track-card.playing{border-color:rgba(200,245,66,.3)}
.track-art-wrap{position:relative;border-radius:8px;overflow:hidden;aspect-ratio:1;margin-bottom:12px;background:var(--surface)}
.track-art{width:100%;height:100%;object-fit:cover;display:block;transition:transform .3s}
.track-card:hover .track-art{transform:scale(1.04)}
.track-play-overlay{position:absolute;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .2s}
.track-card:hover .track-play-overlay{opacity:1}
.track-play-btn{width:44px;height:44px;border-radius:50%;background:var(--accent);color:#0a0a0f;font-size:18px;display:flex;align-items:center;justify-content:center;transform:scale(.8);transition:transform .2s}
.track-card:hover .track-play-btn{transform:scale(1)}
.track-opt-trigger{position:absolute;top:8px;right:8px;width:28px;height:28px;border-radius:50%;background:rgba(0,0,0,0.6);color:white;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .2s;z-index:5}
.track-card:hover .track-opt-trigger{opacity:1}
.track-eq{position:absolute;bottom:8px;right:8px;display:flex;align-items:flex-end;gap:2px;height:16px}
.track-eq span{width:3px;background:var(--accent);border-radius:2px;animation:eq-bar .8s ease-in-out infinite alternate}
.track-eq span:nth-child(1){height:40%;animation-delay:0s}
.track-eq span:nth-child(2){height:80%;animation-delay:.15s}
.track-eq span:nth-child(3){height:55%;animation-delay:.3s}
.track-eq span:nth-child(4){height:90%;animation-delay:.1s}
@keyframes eq-bar{from{transform:scaleY(.4)}to{transform:scaleY(1)}}
.track-title{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3}
.track-artist{font-size:12px;color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
.track-duration{font-size:11px;color:var(--text-dim);font-family:var(--mono);margin-top:6px}

/* Track List */
.track-list{display:flex;flex-direction:column;gap:2px}
.track-row{display:grid;grid-template-columns:40px 44px 1fr auto 32px 32px;align-items:center;gap:12px;padding:8px 12px;border-radius:var(--radius-sm);cursor:pointer;transition:background .15s}
.track-row:hover{background:var(--surface2)}
.track-row.playing{background:rgba(200,245,66,.06)}
.track-row-num{font-size:12px;color:var(--text-dim);font-family:var(--mono);text-align:center}
.track-row-thumb{width:40px;height:40px;border-radius:var(--radius-sm);object-fit:cover;background:var(--surface2)}
.track-row-info .title{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.track-row-info .artist{font-size:12px;color:var(--text-muted);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.track-row-dur{font-size:12px;font-family:var(--mono);color:var(--text-dim)}
.track-row-like, .track-row-opt{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--text-dim);transition:color .15s,background .15s}
.track-row-like.liked{color:var(--accent-warm)}

/* Dynamic Option Dropdown Menu System */
.opt-menu{position:fixed;background:var(--surface2);border:1px solid var(--border-lit);border-radius:var(--radius);padding:6px;width:190px;z-index:200;box-shadow:0 12px 32px rgba(0,0,0,0.6);display:none}
.opt-menu-item{display:flex;align-items:center;gap:10px;padding:10px 12px;font-size:13px;font-weight:500;color:var(--text);width:100%;text-align:left;border-radius:var(--radius-sm)}
.opt-menu-item:hover{background:rgba(255,255,255,0.06);color:var(--accent)}

/* Desktop Player Bar Workspace */
.player-bar{grid-row:2;grid-column:1/-1;background:rgba(17,17,24,.95);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-top:1px solid var(--border);display:grid;grid-template-columns:1fr auto 1fr;align-items:center;padding:0 24px;gap:16px;position:relative;z-index:50}
.player-track{display:flex;align-items:center;gap:14px;min-width:0}
.player-thumb{width:50px;height:50px;border-radius:6px;object-fit:cover;background:var(--surface2);flex-shrink:0}
.player-track-info{min-width:0;cursor:pointer}
.player-track-title{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.player-track-artist{font-size:12px;color:var(--text-muted);margin-top:1px}
.player-like{margin-left:8px;font-size:18px;color:var(--text-dim);transition:color .15s,transform .15s;flex-shrink:0}
.player-like.liked{color:var(--accent-warm)}
.player-controls{display:flex;flex-direction:column;align-items:center;gap:10px;min-width:280px}
.ctrl-buttons{display:flex;align-items:center;gap:4px}
.ctrl-btn{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--text-muted);transition:color .15s,background .15s}
.ctrl-btn:hover{color:var(--text);background:rgba(255,255,255,.06)}
.ctrl-btn.active{color:var(--accent)}
.ctrl-play{width:44px;height:44px;background:var(--accent);color:#0a0a0f;font-size:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:transform .15s,box-shadow .15s;box-shadow:0 2px 12px rgba(200,245,66,.3)}
.progress-wrap{display:flex;align-items:center;gap:10px;width:100%}
.progress-time{font-size:11px;font-family:var(--mono);color:var(--text-dim);flex-shrink:0;width:36px}
.progress-time.end{text-align:right}
.progress-track{flex:1;height:4px;background:var(--surface2);border-radius:2px;cursor:pointer;position:relative;transition:height .15s}
.progress-track:hover{height:6px}
.progress-buffered{position:absolute;left:0;top:0;bottom:0;background:rgba(255,255,255,.08);border-radius:2px;pointer-events:none}
.progress-fill{position:absolute;left:0;top:0;bottom:0;background:var(--accent);border-radius:2px;pointer-events:none}
.progress-thumb{position:absolute;top:50%;transform:translate(-50%,-50%);width:12px;height:12px;border-radius:50%;background:var(--accent);opacity:0;transition:opacity .15s;pointer-events:none}
.progress-track:hover .progress-thumb{opacity:1}
.player-right{display:flex;align-items:center;justify-content:flex-end;gap:8px}
.vol-wrap{display:flex;align-items:center;gap:8px}
.vol-icon{font-size:15px;color:var(--text-muted);cursor:pointer}
.vol-slider{-webkit-appearance:none;width:80px;height:4px;border-radius:2px;background:var(--surface2);outline:none;cursor:pointer}
.vol-slider::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:var(--text);cursor:pointer}

/* Full Screen Mobile Expanded Player Page Drawer Overlay */
.mobile-expanded-player{position:fixed;inset:0;background:linear-gradient(to bottom,#1c1d26 0%,#0c0d12 40%,#040406 100%);z-index:300;padding:24px;flex-direction:column;justify-content:space-between;display:none;transform:translateY(100%);transition:transform 0.4s cubic-bezier(0.16,1,0.3,1)}
.mobile-expanded-player.open{display:flex;transform:translateY(0)}
.mobile-player-header{display:flex;align-items:center;justify-content:between;width:100%}
.mobile-player-chevron{font-size:24px;color:var(--text-muted)}
.mobile-player-meta-title{font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-muted);text-align:center;flex:1}
.mobile-player-art-frame{width:100%;aspect-ratio:1;max-height:330px;border-radius:12px;object-fit:cover;box-shadow:0 16px 48px rgba(0,0,0,0.7);margin:auto 0;background:var(--surface2)}
.mobile-player-details{display:flex;align-items:center;justify-content:space-between;width:100%;margin-top:20px}
.mobile-player-title{font-size:20px;font-weight:800;letter-spacing:-.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:80%}
.mobile-player-artist{font-size:14px;color:var(--text-muted);margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mobile-player-progress-area{width:100%;margin-top:28px}
.mobile-player-scrub{-webkit-appearance:none;width:100%;height:4px;background:rgba(255,255,255,0.1);border-radius:2px;outline:none;cursor:pointer}
.mobile-player-scrub::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:var(--text)}
.mobile-player-time-row{display:flex;justify-content:space-between;font-family:var(--mono);font-size:11px;color:var(--text-dim);margin-top:8px}
.mobile-player-control-matrix{display:flex;align-items:center;justify-content:space-between;width:100%;margin-top:24px;margin-bottom:32px;padding:0 8px}
.mobile-ctrl-btn{font-size:22px;color:var(--text-muted)}
.mobile-ctrl-btn.active{color:var(--accent)}
.mobile-ctrl-play{width:68px;height:68px;border-radius:50%;background:var(--text);color:var(--bg);display:flex;align-items:center;justify-content:center;font-size:24px}

/* Lyrics Panel */
.lyrics-panel{position:fixed;right:0;top:0;bottom:var(--player-h);width:320px;background:rgba(10,10,15,.97);backdrop-filter:blur(24px);border-left:1px solid var(--border);display:flex;flex-direction:column;transform:translateX(100%);transition:transform .3s ease;z-index:40}
.lyrics-panel.open{transform:translateX(0)}
.lyrics-header{padding:20px 20px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.lyrics-title-text{font-size:14px;font-weight:700;letter-spacing:.5px}
.lyrics-close{font-size:20px;color:var(--text-muted);cursor:pointer;transition:color .15s}
.lyrics-close:hover{color:var(--text)}
.lyrics-body{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:6px}
.lyric-line{font-size:15px;line-height:1.7;color:var(--text-dim);transition:color .3s,transform .3s,font-size .3s;cursor:pointer;padding:2px 0;border-radius:4px}
.lyric-line.active{color:var(--text);font-size:17px;font-weight:700}
.lyric-line.past{color:var(--text-muted)}

/* Sleep Timer Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);z-index:100;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--surface);border:1px solid var(--border-lit);border-radius:var(--radius);padding:28px;width:320px;display:flex;flex-direction:column;gap:16px}
.modal-title{font-size:18px;font-weight:700}
.modal-sub{font-size:13px;color:var(--text-muted)}
.timer-options{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.timer-opt{padding:12px;border-radius:var(--radius-sm);border:1px solid var(--border);font-size:14px;font-weight:600;text-align:center;cursor:pointer;transition:border-color .15s,background .15s,color .15s}
.timer-opt.active{border-color:var(--accent);color:var(--accent);background:rgba(200,245,66,.06)}
.timer-display{font-family:var(--mono);font-size:28px;font-weight:700;text-align:center;color:var(--accent);letter-spacing:2px}
.modal-btn{padding:12px;border-radius:var(--radius-sm);background:var(--accent);color:#0a0a0f;font-size:14px;font-weight:700;cursor:pointer;text-align:center}
.modal-btn.secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border)}

/* Sleep Badge */
.sleep-badge{position:fixed;bottom:calc(var(--player-h) + 12px);right:16px;background:var(--surface);border:1px solid var(--accent);border-radius:40px;padding:6px 14px;font-size:12px;font-family:var(--mono);color:var(--accent);z-index:60;display:none;align-items:center;gap:8px}
.sleep-badge.visible{display:flex}
.sleep-cancel{cursor:pointer;opacity:.6;font-size:16px}

/* DB Import/Export Panel */
.db-panel{padding:0 32px 32px}
.db-card{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:20px;display:flex;flex-direction:column;gap:12px;margin-bottom:12px}
.db-card-title{font-size:15px;font-weight:700}
.db-card-sub{font-size:13px;color:var(--text-muted);line-height:1.5}
.db-btn{padding:10px 18px;border-radius:var(--radius-sm);background:var(--surface);border:1px solid var(--border-lit);font-size:13px;font-weight:600;transition:background .15s,border-color .15s;align-self:flex-start}
.db-btn.accent{background:rgba(200,245,66,.1);border-color:rgba(200,245,66,.3);color:var(--accent)}

/* URL Import Bar */
.url-bar{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:16px 20px;display:flex;gap:12px;align-items:center;width:100%}
.url-input{flex:1;background:transparent;border:none;outline:none;font-size:14px;color:var(--text)}
.url-btn{padding:8px 16px;border-radius:var(--radius-sm);background:var(--accent);color:#0a0a0f;font-size:13px;font-weight:700;flex-shrink:0}

/* Skeleton & States */
.skeleton{background:linear-gradient(90deg,var(--surface2) 25%,var(--surface) 50%,var(--surface2) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:var(--radius-sm)}
@keyframes shimmer{from{background-position:200% 0}to{background-position:-200% 0}}
.skeleton-art{width:100%;aspect-ratio:1;border-radius:8px}
.skeleton-text{height:12px;margin-top:10px;width:80%}
.skeleton-text.short{width:55%}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:64px 32px;text-align:center;gap:12px}
.empty-icon{font-size:48px;opacity:.25}
.empty-title{font-size:18px;font-weight:600;color:var(--text-muted)}
.empty-sub{font-size:13px;color:var(--text-dim)}
.toast{position:fixed;bottom:calc(var(--player-h) + 16px);left:50%;transform:translateX(-50%) translateY(16px);background:#1a1a24;border:1px solid var(--border-lit);color:var(--text);padding:10px 20px;border-radius:40px;font-size:13px;font-family:var(--mono);opacity:0;pointer-events:none;transition:opacity .3s,transform .3s;z-index:200}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.buffering-ring{width:20px;height:20px;border:2px solid rgba(200,245,66,.2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.type-pill{padding:8px 14px;border-radius:999px;border:1px solid var(--border);background:var(--surface2);font-size:13px;font-weight:700;color:var(--text-muted);cursor:pointer}

/* ═══════════════════════════════════════════════════════════════════
   CRITICAL RESPONSIVE RESTRUCTURE ENGINE (FIXES MOBILE OVER-SCREEN)
   ═══════════════════════════════════════════════════════════════════ */
@media(max-width:768px){
  :root{--sidebar-w:0px;--player-h:68px}
  #app{grid-template-columns:1fr;grid-template-rows:1fr var(--player-h);height:calc(100vh - var(--mobile-nav-h))}
  .sidebar{display:none}
  .mobile-nav{display:grid}
  .main{grid-column:1;height:100%}
  .content{padding:0 16px calc(var(--player-h) + 24px)}
  .topbar{padding:16px 16px 12px;background:var(--bg)}
  .track-grid{grid-template-columns:repeat(auto-fill,minmax(136px,1fr));gap:10px}
  
  /* Compact Floating Bar style for mobile - never overflows */
  .player-bar{
    grid-template-columns:1fr auto;
    padding:0 12px;
    height:var(--player-h);
    background:rgba(20,20,28,0.96);
    border-top:1px solid rgba(255,255,255,0.08);
    position:fixed;
    bottom:var(--mobile-nav-h);
    left:0;
    right:0;
    width:100%
  }
  .player-right, .progress-wrap, .ctrl-buttons .ctrl-btn{display:none}
  .player-controls{min-width:auto;flex-direction:row}
  .track-row{grid-template-columns:32px 1fr auto 32px}
  .track-row-thumb, .track-row-num{display:none}
}
</style>
</head>
<body>

<div id="app">
  <nav class="sidebar">
    <div class="sidebar-logo"><span class="logo-dot"></span>AuraStream</div>
    <div class="sidebar-section">
      <div class="sidebar-label">Navigate</div>
      <button class="sidebar-item active" data-view="home" onclick="setView('home',this)"><span class="icon">⌂</span>Home</button>
      <button class="sidebar-item" data-view="search" onclick="setView('search',this)"><span class="icon">⌕</span>Search</button>
      <button class="sidebar-item" data-view="library" onclick="setView('library',this)"><span class="icon">◧</span>Library</button>
    </div>
    <div class="sidebar-divider"></div>
    <div class="sidebar-section">
      <div class="sidebar-label">Your Music</div>
      <button class="sidebar-item" data-view="liked" onclick="setView('liked',this)"><span class="icon">♡</span>Liked Songs</button>
      <button class="sidebar-item" data-view="history" onclick="setView('history',this)"><span class="icon">◷</span>History</button>
      <button class="sidebar-item" data-view="playlists" onclick="setView('playlists',this)"><span class="icon">♫</span>Playlists</button>
    </div>
    <div class="sidebar-divider"></div>
    <div class="sidebar-section">
      <div class="sidebar-label">Tools</div>
      <button class="sidebar-item" data-view="import" onclick="setView('import',this)"><span class="icon">⇅</span>Import / Export</button>
    </div>
  </nav>

  <main class="main">
    <div class="topbar">
      <div class="search-wrap">
        <span class="search-icon">⌕</span>
        <input class="search-input" type="text" id="searchInput"
               placeholder="Search or paste a YouTube URL…"
               autocomplete="off"
               oninput="handleSearchInput(this.value)"/>
      </div>
      <div class="topbar-actions">
        <button class="topbar-btn" onclick="openSleepModal()">🌙</button>
        <button class="topbar-btn" onclick="toggleLyrics()">♪</button>
      </div>
    </div>
    <div class="content" id="content"></div>
  </main>

  <div class="player-bar" id="playerBar">
    <div class="player-track" onclick="expandMobilePlayer()">
      <img class="player-thumb" id="playerThumb" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg'%3E%3Crect fill='%2318181f' width='100%21'/%3E%3C/svg%3E" alt=""/>
      <div class="player-track-info">
        <div class="player-track-title" id="playerTitle">—</div>
        <div class="player-track-artist" id="playerArtist">—</div>
      </div>
      <button class="player-like" id="playerLikeBtn" onclick="event.stopPropagation();toggleCurrentLike()">♡</button>
    </div>
    <div class="player-controls">
      <div class="ctrl-buttons">
        <button class="ctrl-btn" id="shuffleBtn" onclick="toggleShuffle()">⇄</button>
        <button class="ctrl-btn" onclick="prevTrack()">⏮</button>
        <button class="ctrl-play" id="playBtn" onclick="event.stopPropagation();togglePlay()">▶</button>
        <button class="ctrl-btn" onclick="nextTrack()">⏭</button>
        <button class="ctrl-btn" id="repeatBtn" onclick="cycleRepeat()">↻</button>
      </div>
      <div class="progress-wrap">
        <span class="progress-time" id="currentTimeEl">0:00</span>
        <div class="progress-track" id="progressTrack" onclick="handleProgressClick(event)">
          <div class="progress-buffered" id="progressBuffered"></div>
          <div class="progress-fill" id="progressFill"></div>
          <div class="progress-thumb" id="progressThumb"></div>
        </div>
        <span class="progress-time end" id="durationEl">0:00</span>
      </div>
    </div>
    <div class="player-right">
      <div class="vol-wrap">
        <span class="vol-icon" id="volIcon" onclick="toggleMute()">🔊</span>
        <input class="vol-slider" type="range" min="0" max="100" value="85" oninput="setVolume(this.value/100)"/>
      </div>
      <button class="player-icon-btn" id="lyricsBtn" onclick="toggleLyrics()">♪</button>
    </div>
  </div>
</div>

<div class="mobile-nav" id="mobileNav">
  <button class="mobile-nav-btn active" onclick="setMobileView('home')"><span class="icon">⌂</span>Home</button>
  <button class="mobile-nav-btn" onclick="setMobileView('search')"><span class="icon">⌕</span>Search</button>
  <button class="mobile-nav-btn" onclick="setMobileView('playlists')"><span class="icon">♫</span>Playlists</button>
  <button class="mobile-nav-btn" onclick="setMobileView('import')"><span class="icon">⇅</span>Tools</button>
</div>

<div class="mobile-expanded-player" id="mobileExpandedPlayer">
  <div class="mobile-player-header">
    <button class="mobile-player-chevron" onclick="collapseMobilePlayer()">✕</button>
    <div class="mobile-player-meta-title" id="mobileExpandedHeaderView">Now Playing</div>
    <button class="mobile-player-chevron" onclick="toggleLyrics(); collapseMobilePlayer()">♪</button>
  </div>
  <img class="mobile-player-art-frame" id="mobileExpandedArt" src="" alt=""/>
  <div class="mobile-player-details">
    <div style="max-width: 80%; overflow: hidden;">
      <div class="mobile-player-title" id="mobileExpandedTitle">—</div>
      <div class="mobile-player-artist" id="mobileExpandedArtist">—</div>
    </div>
    <button class="player-like" id="mobileExpandedLikeBtn" style="font-size:24px" onclick="toggleCurrentLike()">♡</button>
  </div>
  <div class="mobile-player-progress-area">
    <input class="mobile-player-scrub" type="range" id="mobilePlayerScrub" min="0" max="100" value="0"
           oninput="handleMobileScrub(this.value)" onchange="handleMobileScrubEnd(this.value)"/>
    <div class="mobile-player-time-row">
      <span id="mobileCurrentTime">0:00</span>
      <span id="mobileDuration">0:00</span>
    </div>
  </div>
  <div class="mobile-player-control-matrix">
    <button class="mobile-ctrl-btn" id="mobileShuffleBtn" onclick="toggleShuffle()">⇄</button>
    <button class="mobile-ctrl-btn" onclick="prevTrack()">⏮</button>
    <button class="mobile-ctrl-play" id="mobilePlayBtn" onclick="togglePlay()">▶</button>
    <button class="mobile-ctrl-btn" onclick="nextTrack()">⏭</button>
    <button class="mobile-ctrl-btn" id="mobileRepeatBtn" onclick="cycleRepeat()">↻</button>
  </div>
</div>

<div class="opt-menu" id="optMenu"></div>

<div class="lyrics-panel" id="lyricsPanel">
  <div class="lyrics-header">
    <span class="lyrics-title-text">LYRICS</span>
    <span class="lyrics-close" onclick="toggleLyrics()">✕</span>
  </div>
  <div class="lyrics-body" id="lyricsBody">
    <div class="lyrics-none"><span>Play a track to see lyrics</span></div>
  </div>
</div>

<div class="modal-overlay" id="sleepModal">
  <div class="modal">
    <div class="modal-title">Sleep Timer</div>
    <div class="modal-sub">Playback will stop after the selected time.</div>
    <div class="timer-options">
      <div class="timer-opt" onclick="setSleepTimer(15,this)">15 min</div>
      <div class="timer-opt" onclick="setSleepTimer(30,this)">30 min</div>
      <div class="timer-opt" onclick="setSleepTimer(45,this)">45 min</div>
      <div class="timer-opt" onclick="setSleepTimer(60,this)">60 min</div>
    </div>
    <div class="timer-display" id="timerDisplay">--:--</div>
    <button class="modal-btn" onclick="closeSleepModal()">Done</button>
    <button class="modal-btn secondary" onclick="cancelSleepTimer()">Cancel Timer</button>
  </div>
</div>

<div class="sleep-badge" id="sleepBadge">
  <span>🌙</span><span id="sleepBadgeTime">--:--</span>
</div>

<div class="toast" id="toast"></div>

<script>
const API = '';

// ── 1. DB Store Allocations ──────────────────────────────────────────
const DB_NAME = 'aurastream_v3';
const DB_VERSION = 3;
let db = null;

async function openDB() {
  return new Promise((res, rej) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = e => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains('liked'))      d.createObjectStore('liked',      { keyPath: 'id' });
      if (!d.objectStoreNames.contains('history'))    d.createObjectStore('history',    { keyPath: 'id' });
      if (!d.objectStoreNames.contains('playlists'))  d.createObjectStore('playlists',  { keyPath: 'id' });
      if (!d.objectStoreNames.contains('queue'))      d.createObjectStore('queue',      { keyPath: 'key' });
      if (!d.objectStoreNames.contains('cached_tracks')) d.createObjectStore('cached_tracks', { keyPath: 'id' });
    };
    req.onsuccess = e => res(e.target.result);
    req.onerror   = e => rej(e.target.error);
  });
}

async function dbGet(store, key) {
  return new Promise((res) => {
    const tx = db.transaction(store,'readonly');
    const req = tx.objectStore(store).get(key);
    req.onsuccess = () => res(req.result);
    req.onerror = () => res(null);
  });
}
async function dbGetAll(store) {
  return new Promise((res) => {
    const tx = db.transaction(store,'readonly');
    const req = tx.objectStore(store).getAll();
    req.onsuccess = () => res(req.result);
    req.onerror = () => res([]);
  });
}
async function dbPut(store, val) {
  return new Promise((res) => {
    const tx = db.transaction(store,'readwrite');
    tx.objectStore(store).put(val);
    tx.oncomplete = () => res(true);
  });
}
async function dbDelete(store, key) {
  return new Promise((res) => {
    const tx = db.transaction(store,'readwrite');
    tx.objectStore(store).delete(key);
    tx.oncomplete = () => res(true);
  });
}

// ── 2. Playlist Utilities ───────────────────────────────────────────
async function createPlaylist(name) {
  if(!name.trim()) return;
  const id = 'pl_' + Date.now();
  const pl = { id, name: name.trim(), tracks: [], createdAt: Date.now() };
  await dbPut('playlists', pl);
  state.playlists.push(pl);
  showToast(`Playlist "${name}" created ✓`);
  renderContent();
}

async function addTrackToPlaylist(playlistId, track) {
  const pl = await dbGet('playlists', playlistId);
  if(!pl) return;
  if(pl.tracks.some(t => t.id === track.id)) {
    showToast('Track already inside playlist');
    return;
  }
  pl.tracks.push(track);
  await dbPut('playlists', pl);
  state.playlists = await dbGetAll('playlists');
  showToast(`Added to ${pl.name} ✓`);
  closeOptMenu();
}

// ── 3. Application State Registry ────────────────────────────────────
const state = {
  currentTrack:  null,
  searchType:    'songs',
  queue:         [],
  queueIndex:    -1,
  isPlaying:     false,
  isBuffering:   false,
  currentTime:   0,
  duration:      0,
  isDragging:    false,
  volume:        0.85,
  isMuted:       false,
  repeatMode:    'none',
  isShuffled:    false,
  shuffleOrder:  [],
  likedIds:      new Set(),
  likedTracks:   [],
  history:       [],
  playlists:     [],
  view:          'home',
  searchQuery:   '',
  searchResults: [],
  isSearching:   false,
  lyricsOpen:    false,
  lyricsData:    null,
  lyricsLoading: false,
  sleepTimer:    null,
  isPlayerOpen:  false
};

// ── 4. Audio Playback Core ───────────────────────────────────────────
const audio = new Audio();
audio.preload = 'metadata';

audio.addEventListener('timeupdate', () => {
  if (state.isDragging || !audio.duration) return;
  state.currentTime = audio.currentTime;
  
  // Sink timeline sliders simultaneously
  el('currentTimeEl').textContent = fmtTime(audio.currentTime);
  el('mobileCurrentTime').textContent = fmtTime(audio.currentTime);
  
  const pct = (audio.currentTime / audio.duration) * 100;
  el('progressFill').style.width = `${pct}%`;
  el('progressThumb').style.left = `${pct}%`;
  
  if(!state.isDragging) {
    el('mobilePlayerScrub').value = pct;
  }
  updateLyricsSync(audio.currentTime);
});

audio.addEventListener('durationchange', () => {
  state.duration = isFinite(audio.duration) ? audio.duration : 0;
  el('durationEl').textContent = fmtTime(state.duration);
  el('mobileDuration').textContent = fmtTime(state.duration);
});

audio.addEventListener('playing',  () => { state.isPlaying = false; state.isPlaying = true; syncPlayBtn(); updateMediaSession(); });
audio.addEventListener('pause',    () => { state.isPlaying = false; syncPlayBtn(); updateMediaSession(); });
audio.addEventListener('ended',    handleTrackEnd);

async function loadTrack(track, queue = [track], index = 0, autoplay = true) {
  state.currentTrack = track;
  state.queue        = queue;
  state.queueIndex   = index;
  
  audio.src = `${API}/api/stream/${track.id}`;
  audio.load();
  if (autoplay) audio.play().catch(() => {});

  // System Text Overwrites
  el('playerTitle').textContent  = track.title;
  el('playerArtist').textContent = track.artist;
  el('playerThumb').src          = track.thumbnail || '';
  
  // Expand mobile panel context matching values
  el('mobileExpandedTitle').textContent = track.title;
  el('mobileExpandedArtist').textContent = track.artist;
  el('mobileExpandedArt').src = track.thumbnail || '';

  syncLikeBtn();
  updateMediaSession(track);
  dbPut('history', { ...track, playedAt: Date.now() });
  renderContent();
  if (state.lyricsOpen) fetchLyrics(track.id);
}

function handleTrackEnd() {
  if (state.repeatMode === 'one') { audio.currentTime = 0; audio.play(); return; }
  const next = resolveNextIndex(1);
  if (next !== null) loadTrack(state.queue[next], state.queue, next);
}

function resolveNextIndex(dir) {
  if (!state.queue.length) return null;
  const next = state.queueIndex + dir;
  if (next < 0 || next >= state.queue.length) return state.repeatMode === 'all' ? 0 : null;
  return next;
}

function togglePlay() {
  if (!state.currentTrack) return;
  if (state.isPlaying) audio.pause();
  else audio.play().catch(() => {});
}
function prevTrack() {
  const prev = resolveNextIndex(-1);
  if (prev !== null) loadTrack(state.queue[prev], state.queue, prev);
}
function nextTrack() {
  const next = resolveNextIndex(1);
  if (next !== null) loadTrack(state.queue[next], state.queue, next);
}
function toggleShuffle() {
  state.isShuffled = !state.isShuffled;
  el('shuffleBtn').classList.toggle('active', state.isShuffled);
  el('mobileShuffleBtn').classList.toggle('active', state.isShuffled);
}
function cycleRepeat() {
  const modes = ['none','all','one'];
  state.repeatMode = modes[(modes.indexOf(state.repeatMode)+1)%modes.length];
  el('repeatBtn').classList.toggle('active', state.repeatMode !== 'none');
  el('mobileRepeatBtn').classList.toggle('active', state.repeatMode !== 'none');
}

// ── 5. Playhead Scrubbing Mechanics ──────────────────────────────────
function handleProgressClick(e) {
  if (!audio.duration) return;
  const rect = e.currentTarget.getBoundingClientRect();
  const pct = (e.clientX - rect.left) / rect.width;
  audio.currentTime = pct * audio.duration;
}
function handleMobileScrub(val) {
  state.isDragging = true;
  if(!audio.duration) return;
  const targetTime = (val / 100) * audio.duration;
  el('mobileCurrentTime').textContent = fmtTime(targetTime);
}
function handleMobileScrubEnd(val) {
  state.isDragging = false;
  if(!audio.duration) return;
  audio.currentTime = (val / 100) * audio.duration;
}
function setVolume(v) { audio.volume = v; }

// ── 6. Context Option Dropdown Controller ────────────────────────────
function openOptMenu(e, trackJson) {
  e.stopPropagation();
  const track = JSON.parse(decodeURIComponent(trackJson));
  const menu = el('optMenu');
  
  let playlistItems = state.playlists.map(pl => `
    <button class="opt-menu-item" onclick="addTrackToPlaylist('${pl.id}', ${JSON.stringify(track).replace(/"/g, '&quot;')})">
      <span>+</span> Add to ${esc(pl.name)}
    </button>
  `).join('');

  menu.innerHTML = `
    <button class="opt-menu-item" onclick="toggleLike(${JSON.stringify(track).replace(/"/g, '&quot;')})">
      <span>♡</span> Toggle Favorite
    </button>
    <div style="height:1px; background:var(--border); margin:4px 0"></div>
    ${playlistItems || '<div style="font-size:11px; padding:8px; color:var(--text-dim)">No custom playlists</div>'}
  `;
  
  menu.style.display = 'block';
  // Position window intelligently flanking pointer coordinate indexes
  menu.style.left = `${Math.min(e.clientX, window.innerWidth - 200)}px`;
  menu.style.top = `${Math.min(e.clientY, window.innerHeight - 200)}px`;

  document.addEventListener('click', closeOptMenu, { once: true });
}
function closeOptMenu() { el('optMenu').style.display = 'none'; }

// ── 7. UI Presentation Modals & Expanders ───────────────────────────
function expandMobilePlayer() {
  if(window.innerWidth <= 768) el('mobileExpandedPlayer').classList.add('open');
}
function collapseMobilePlayer() {
  el('mobileExpandedPlayer').classList.remove('open');
}
function setMobileView(view) {
  document.querySelectorAll('.mobile-nav-btn').forEach(b => b.classList.remove('active'));
  event.currentTarget.classList.add('active');
  setView(view, null);
}

// ── 8. Search Categorization Engine ──────────────────────────────────
let _searchTimeout = null;
async function handleSearchInput(val) {
  state.searchQuery = val.trim();
  clearTimeout(_searchTimeout);
  if (!state.searchQuery) { setView('home', null); return; }

  setViewSilent('search');
  _searchTimeout = setTimeout(async () => {
    state.isSearching = true; renderContent();
    try {
      const res = await fetch(`${API}/api/search?q=${encodeURIComponent(state.searchQuery)}&type=${state.searchType}&limit=24`);
      const data = await res.json();
      state.searchResults = data.results || [];
    } catch {
      state.searchResults = [];
    }
    state.isSearching = false; renderContent();
  }, 400);
}

// ── 9. Rendering Core Matrix ─────────────────────────────────────────
function renderContent() {
  const c = el('content');
  switch (state.view) {
    case 'home':      c.innerHTML = renderHome(); break;
    case 'search':    c.innerHTML = renderSearch(); break;
    case 'playlists': c.innerHTML = renderPlaylists(); break;
    case 'liked':     c.innerHTML = renderLiked(); break;
    case 'history':   c.innerHTML = renderHistory(); break;
    case 'import':    c.innerHTML = renderImport(); break;
  }
}

function renderHome() {
  return `
    <div class="now-banner">
      <div class="now-banner-info">
        <div class="now-banner-eyebrow">Welcome To AuraStream</div>
        <div class="now-banner-title">Premium Architecture</div>
        <div class="now-banner-artist">Mobile Optimized Ecosystem Layout</div>
      </div>
    </div>
    <div class="section-header">
      <span class="section-title">Explore Library Space</span>
    </div>
    <div class="track-grid">
      ${state.likedTracks.slice(0, 6).map((t, i) => renderTrackCard(t, state.likedTracks, i)).join('')}
    </div>
  `;
}

function renderSearch() {
  const pills = `
    <div class="section-header" style="gap:8px; margin-top:12px">
      <button class="type-pill" style="${state.searchType==='songs'?'border-color:var(--accent);color:var(--text)':''}" onclick="state.searchType='songs'; handleSearchInput(state.searchQuery)">Songs</button>
      <button class="type-pill" style="${state.searchType==='albums'?'border-color:var(--accent);color:var(--text)':''}" onclick="state.searchType='albums'; handleSearchInput(state.searchQuery)">Albums</button>
      <button class="type-pill" style="${state.searchType==='artists'?'border-color:var(--accent);color:var(--text)':''}" onclick="state.searchType='artists'; handleSearchInput(state.searchQuery)">Artists</button>
    </div>
  `;
  if(state.isSearching) return pills + '<div class="empty-state">Scraping records...</div>';
  return pills + `<div class="track-grid" style="margin-top:20px">${state.searchResults.map((t,i)=>renderTrackCard(t,state.searchResults,i)).join('')}</div>`;
}

function renderPlaylists() {
  let listHtml = state.playlists.map(pl => `
    <div class="db-card" style="background:var(--surface2)">
      <div class="section-header" style="margin:0; padding-bottom:8px">
        <span class="section-title" style="font-size:16px; color:var(--accent)">➔ ${esc(pl.name)}</span>
        <span class="section-count">${pl.tracks.length} tracks</span>
        <button class="section-more" style="color:var(--accent-warm)" onclick="dbDelete('playlists','${pl.id}').then(init)">Delete</button>
      </div>
      <div class="track-list">
        ${pl.tracks.map((t,i) => renderTrackRow(t, pl.tracks, i)).join('')}
      </div>
    </div>
  `).join('');

  return `
    <div class="section-header"><span class="section-title">Playlists Manager</span></div>
    <div class="playlist-trigger-bar">
      <input class="playlist-input" id="newPlInput" type="text" placeholder="Create new playlist name..."/>
      <button class="playlist-btn" onclick="createPlaylist(el('newPlInput').value)">Create</button>
    </div>
    <div style="display:flex; flex-direction:column; gap:16px">${listHtml || '<div class="empty-state">No custom playlists created yet</div>'}</div>
  `;
}

function renderLiked() {
  return `<div class="section-header"><span class="section-title">Liked Favourites</span></div><div class="track-list">${state.likedTracks.map((t,i)=>renderTrackRow(t,state.likedTracks,i)).join('')}</div>`;
}
function renderHistory() { return `<div class="track-list">${state.history.map((t,i)=>renderTrackRow(t,state.history,i)).join('')}</div>`; }
function renderImport() { return `<div class="db-panel"><button class="db-btn accent" onclick="exportDB()">Backup Library Data Layer</button></div>`; }

function renderTrackCard(track, queue, index) {
  const enc = encodeURIComponent(JSON.stringify(track));
  return `
    <div class="track-card" onclick="playFromList('${esc(track.id)}',${JSON.stringify(queue.map(t=>t.id)).replace(/"/g,'&quot;')})">
      <div class="track-art-wrap">
        <img class="track-art" src="${esc(track.thumbnail)}" loading="lazy"/>
        <button class="track-opt-trigger" onclick="openOptMenu(event, '${enc}')">•••</button>
      </div>
      <div class="track-title">${esc(track.title)}</div>
      <div class="track-artist">${esc(track.artist)}</div>
    </div>`;
}

function renderTrackRow(track, queue, index) {
  const enc = encodeURIComponent(JSON.stringify(track));
  const liked = state.likedIds.has(track.id);
  return `
    <div class="track-row" onclick="playFromList('${esc(track.id)}',${JSON.stringify(queue.map(t=>t.id)).replace(/"/g,'&quot;')})">
      <div class="track-row-num">${index+1}</div>
      <div class="track-row-info">
        <div class="title">${esc(track.title)}</div>
        <div class="artist">${esc(track.artist)}</div>
      </div>
      <button class="track-row-like ${liked?'liked':''}" onclick="event.stopPropagation(); toggleLike(${JSON.stringify(track).replace(/"/g, '&quot;')})">♥</button>
      <button class="track-row-opt" onclick="openOptMenu(event, '${enc}')">•••</button>
    </div>`;
}

// ── 10. Sync Systems & Structural Inits ──────────────────────────────
function playFromList(id, idList) {
  const all = [...state.searchResults, ...state.likedTracks, ...state.history];
  state.playlists.forEach(p => all.push(...p.tracks));
  const track = all.find(t => t.id === id);
  const queue = idList.map(qid => all.find(t => t.id === qid)).filter(Boolean);
  if(track) loadTrack(track, queue, queue.findIndex(t=>t.id===id));
}

async function toggleCurrentLike() { if(state.currentTrack) await toggleLike(state.currentTrack); }
async function toggleLike(track) {
  if (state.likedIds.has(track.id)) {
    await dbDelete('liked', track.id); state.likedIds.delete(track.id);
  } else {
    await dbPut('liked', track); state.likedIds.add(track.id);
  }
  state.likedTracks = await dbGetAll('liked');
  syncLikeBtn(); renderContent();
}

function syncPlayBtn() {
  const label = state.isPlaying ? '⏸' : '▶';
  el('playBtn').textContent = label;
  el('mobilePlayBtn').textContent = label;
}
function syncLikeBtn() {
  if(!state.currentTrack) return;
  const liked = state.likedIds.has(state.currentTrack.id);
  const glyph = liked ? '♥' : '♡';
  el('playerLikeBtn').textContent = glyph;
  el('mobileExpandedLikeBtn').textContent = glyph;
}

function setView(view, btnEl) {
  state.view = view;
  document.querySelectorAll('.sidebar-item').forEach(b => b.classList.remove('active'));
  if(btnEl) btnEl.classList.add('active');
  renderContent();
}
function setViewSilent(view) { state.view = view; }
function el(id) { return document.getElementById(id); }
function fmtTime(s) {
  if(!s) return '0:00';
  const m = Math.floor(s/60); const sec = Math.floor(s%60).toString().padStart(2,'0');
  return `${m}:${sec}`;
}
function esc(str) { return String(str||'').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

let _toastTimer = null;
function showToast(msg) {
  const t = el('toast'); t.textContent = msg; t.className = 'toast show';
  clearTimeout(_toastTimer); _toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
}

// Global System Boot Up Loop triggers
async function init() {
  db = await openDB();
  state.likedTracks = await dbGetAll('liked');
  state.likedIds = new Set(state.likedTracks.map(t => t.id));
  state.history = await dbGetAll('history');
  state.playlists = await dbGetAll('playlists');
  renderContent();
}
init();
</script>
