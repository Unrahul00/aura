version: "3.9"

services:

  aurastream-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aurastream-api
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
    networks:
      - aura-internal
      - proxy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 512M

  aurastream-web:
    image: nginx:1.27-alpine
    container_name: aurastream-web
    restart: unless-stopped
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx-static.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - aura-internal
      - proxy
    depends_on:
      - aurastream-api

networks:
  aura-internal:
    driver: bridge
    internal: true

  proxy:
    external: true
