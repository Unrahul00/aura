# ═══════════════════════════════════════════════════════════════════════════════
# AuraStream — Nginx Reverse Proxy
# Domain:  aurastream.editwithrahul.xyz
# Place:   /etc/nginx/sites-available/aurastream.editwithrahul.xyz
# Enable:  ln -s /etc/nginx/sites-available/aurastream.editwithrahul.xyz \
#                /etc/nginx/sites-enabled/
# ═══════════════════════════════════════════════════════════════════════════════
#
# Cloudflare handles external TLS (Full or Full Strict mode).
# Nginx only needs to listen on 80 (Cloudflare terminates HTTPS at the edge).
# If you want end-to-end encryption, install a Cloudflare Origin Certificate
# and enable the HTTPS server block at the bottom.
# ═══════════════════════════════════════════════════════════════════════════════


# ── Upstream Definitions ──────────────────────────────────────────────────────

upstream aurastream_api {
    server aurastream-api:8000;
    keepalive 32;                    # reuse connections to FastAPI
}

upstream aurastream_web {
    server aurastream-web:80;
    keepalive 16;
}


# ── HTTP Server (Cloudflare proxies HTTPS → your server on port 80) ───────────

server {
    listen 80;
    listen [::]:80;
    server_name aurastream.editwithrahul.xyz;

    # ── Security Headers ────────────────────────────────────────────────────
    add_header X-Frame-Options           "SAMEORIGIN"   always;
    add_header X-Content-Type-Options    "nosniff"      always;
    add_header Referrer-Policy           "strict-origin" always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Permissions-Policy        "autoplay=*"   always;

    # Trust Cloudflare's real-IP header so your logs show visitor IPs
    # (not Cloudflare datacenter IPs)
    real_ip_header    CF-Connecting-IP;
    # Cloudflare IPv4 ranges — update from https://www.cloudflare.com/ips/
    set_real_ip_from  103.21.244.0/22;
    set_real_ip_from  103.22.200.0/22;
    set_real_ip_from  103.31.4.0/22;
    set_real_ip_from  104.16.0.0/13;
    set_real_ip_from  104.24.0.0/14;
    set_real_ip_from  108.162.192.0/18;
    set_real_ip_from  131.0.72.0/22;
    set_real_ip_from  141.101.64.0/18;
    set_real_ip_from  162.158.0.0/15;
    set_real_ip_from  172.64.0.0/13;
    set_real_ip_from  173.245.48.0/20;
    set_real_ip_from  188.114.96.0/20;
    set_real_ip_from  190.93.240.0/20;
    set_real_ip_from  197.234.240.0/22;
    set_real_ip_from  198.41.128.0/17;

    # ── /api/* → FastAPI Backend ────────────────────────────────────────────
    location /api/ {

        proxy_pass         http://aurastream_api;
        proxy_http_version 1.1;

        # Keep-alive to backend
        proxy_set_header Connection        "";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # ── Critical: Disable ALL proxy buffering for audio streaming ───────
        # Without this, Nginx will buffer the entire stream in memory/disk
        # before sending a single byte to the client — breaking chunked audio.
        proxy_buffering            off;
        proxy_request_buffering    off;

        # ── Range request passthrough (enables audio seeking) ───────────────
        # The browser sends "Range: bytes=N-" when the user scrubs the track.
        # We must forward this header verbatim to FastAPI, which then forwards
        # it to YouTube's CDN. The 206 Partial Content response flows back
        # through the same path.
        proxy_set_header Range              $http_range;
        proxy_set_header If-Range           $http_if_range;

        # Pass these response headers back to the browser
        proxy_pass_header  Accept-Ranges;
        proxy_pass_header  Content-Range;
        proxy_pass_header  Content-Length;
        proxy_pass_header  X-Duration;

        # ── Timeouts tuned for long audio streams ───────────────────────────
        # Default send_timeout is 60s — a 4-minute track would time out.
        proxy_connect_timeout   10s;
        proxy_send_timeout      3600s;   # 1 hour max stream duration
        proxy_read_timeout      3600s;

        # ── CORS (handled by FastAPI, but allow preflight to pass through) ──
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin  "*";
            add_header Access-Control-Allow-Methods "GET, OPTIONS";
            add_header Access-Control-Allow-Headers "Range, Content-Type";
            add_header Content-Length 0;
            return 204;
        }
    }

    # ── /api/stream/* — extra hardening for the streaming route ────────────
    location /api/stream/ {

        proxy_pass         http://aurastream_api;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;

        # Streaming-specific: absolutely no buffering
        proxy_buffering          off;
        proxy_request_buffering  off;

        # Range support
        proxy_set_header Range     $http_range;
        proxy_set_header If-Range  $http_if_range;
        proxy_pass_header Accept-Ranges;
        proxy_pass_header Content-Range;
        proxy_pass_header Content-Length;
        proxy_pass_header X-Duration;

        # Force chunked transfer encoding
        chunked_transfer_encoding on;

        # Long timeouts
        proxy_connect_timeout  10s;
        proxy_send_timeout     3600s;
        proxy_read_timeout     3600s;

        # Tell Cloudflare not to cache audio streams
        add_header Cache-Control "no-store, no-cache" always;

        # Disable Nginx's own response size limit
        proxy_max_temp_file_size 0;
    }

    # ── /* → Frontend static files ──────────────────────────────────────────
    location / {
        proxy_pass         http://aurastream_web;
        proxy_http_version 1.1;
        proxy_set_header   Connection  "";
        proxy_set_header   Host        $host;

        # Cache HTML: never. Cache assets: browser handles via response headers.
        proxy_cache_bypass 1;
    }

    # ── Logging ─────────────────────────────────────────────────────────────
    access_log /var/log/nginx/aurastream.access.log combined;
    error_log  /var/log/nginx/aurastream.error.log  warn;
}


# ═══════════════════════════════════════════════════════════════════════════════
# OPTIONAL: HTTPS with Cloudflare Origin Certificate
# (use if Cloudflare SSL mode is "Full (Strict)")
#
# 1. In Cloudflare dashboard → SSL/TLS → Origin Server → Create Certificate
# 2. Save as /etc/ssl/aurastream/cf-origin.pem and cf-origin.key
# 3. Uncomment the block below and reload Nginx
# ═══════════════════════════════════════════════════════════════════════════════

